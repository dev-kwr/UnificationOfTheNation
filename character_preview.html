<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>将軍 & 忍者 プレビューツール</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #1a1a1a;
            --accent: #dcb854; /* 将軍ゴールド */
            --accent-glow: rgba(220, 184, 84, 0.4);
            --text: #e0e0e0;
            --text-muted: #888;
            --border: #333;
            --btn: #2a2a2a;
            --btn-hover: #3a3a3a;
            --btn-active: #735c21;
        }

        body.mode-ninja {
            --accent: #00bfff; /* 忍者の鉢巻色 (DeepSkyBlue) */
            --accent-glow: rgba(0, 191, 255, 0.4);
            --btn-active: #0080af;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .preview-app {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .top-panel {
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-row {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .canvas-container {
            position: relative;
            background: linear-gradient(to bottom, #777, #555); /* 明るいグラデーション */
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 100%;
            margin: 0 auto;
        }

        canvas { 
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 800 / 500;
            image-rendering: pixelated;
        }

        .weapon-info {
            background: #111;
            border: 1px solid var(--border);
            padding: 0 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            color: var(--accent);
            min-width: 100px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        button:not(.pill-toggle button), .weapon-info, select, .pill-toggle {
            height: 35px !important;
            min-height: 35px !important;
            max-height: 35px !important;
            box-sizing: border-box !important;
            margin: 0 !important;
        }

        button:not(.pill-toggle button) { 
            background: var(--btn);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.1s ease;
            outline: none;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover, .weapon-info:hover, select:hover, .pill-toggle button:hover {
            filter: brightness(1.2);
            border-color: #777 !important;
        }

        button:active, .weapon-info:active, .pill-toggle button:active {
            transform: scale(0.97);
            filter: brightness(0.9);
        }

        button.active {
            background: var(--btn-active) !important;
            border-color: var(--accent) !important;
            color: #fff !important;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* ピル型トグル */
        .pill-toggle {
            position: relative;
            display: flex;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1px;
            gap: 0;
            overflow: hidden;
            width: 140px;
            flex-shrink: 0;
        }

        .pill-toggle .pill-bg {
            position: absolute;
            top: 1px;
            left: 1px;
            width: calc(50% - 1px);
            height: calc(100% - 2px);
            background: var(--accent);
            border-radius: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        body.mode-ninja .pill-toggle .pill-bg {
            transform: translateX(100%);
            background: var(--accent);
        }

        .pill-toggle button {
            position: relative;
            flex: 1;
            border: none;
            border-radius: 18px;
            padding: 0;
            height: 100% !important;
            min-height: 0;
            font-size: 13px;
            font-weight: 600;
            background: transparent !important;
            color: #888;
            z-index: 1;
            transition: all 0.2s ease;
            box-shadow: none !important;
            cursor: pointer;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pill-toggle button.active {
            color: #000 !important;
            background: transparent !important;
            box-shadow: none !important;
        }

        select {
            background: #222;
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23888%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            padding-right: 30px;
        }

        summary {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
        }

        .tuning-grid {
            background: #111;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
        }

        .param-col h4 {
            margin: 0 0 10px 0;
            color: var(--accent);
            font-size: 11px;
            text-transform: uppercase;
            border-bottom: 1px solid #222;
            padding-bottom: 4px;
        }

        .param-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 11px;
        }

        .param-row label { width: 130px; color: #999; }
        .param-row input { flex: 1; accent-color: var(--accent); }
        .param-row span { width: 40px; text-align: right; color: var(--accent); font-family: monospace; font-weight: bold; }

        .sys-group {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="preview-app">
        <header class="top-panel">
            <div class="panel-row">
                <div class="pill-toggle">
                    <div class="pill-bg"></div>
                    <button id="btnModeShogun" class="active">将軍</button>
                    <button id="btnModeNinja">忍者</button>
                </div>
                <div class="control-group">
                    <select id="selSkillLv">
                        <option value="0">初級</option>
                        <option value="1">中級</option>
                        <option value="2">上級</option>
                        <option value="3" selected>特級</option>
                    </select>
                </div>
                <div class="control-group">
                    <div id="selectedSubWeapon" class="weapon-info" title="クリックで忍具切替">---</div>
                </div>
                <button id="btnOugi" class="action-btn">奥義</button>
                <button id="btnOonagi">大薙</button>
                <button id="btnKakuremi">隠れ身</button>
                <button id="btnRestart" style="background:#442222; border-color: var(--border); height: 35px;">リセット</button>
            </div>
        </header>

        <div class="canvas-container">
            <canvas id="previewCanvas" width="800" height="500"></canvas>
        </div>

        <details id="tuningSection" class="tuning-section" open>
            <summary>将軍の角調整</summary>
            <div class="tuning-grid">
                <div class="param-col">
                    <h4>奥の角 (Far Horn)</h4>
                    <div class="param-row"><label>根元X</label><input type="range" id="farBaseX" min="-1.0" max="1.0" step="0.01" value="-0.03"><span id="val_farBaseX">-0.03</span></div>
                    <div class="param-row"><label>根元Y</label><input type="range" id="farBaseY" min="0.0" max="1.5" step="0.01" value="0.18"><span id="val_farBaseY">0.18</span></div>
                    <div class="param-row"><label>角度</label><input type="range" id="farAngle" min="-180" max="180" step="1" value="7"><span id="val_farAngle">7</span></div>
                    <div class="param-row"><label>先端X</label><input type="range" id="farTipX" min="-0.5" max="0.5" step="0.01" value="0.20"><span id="val_farTipX">0.20</span></div>
                    <div class="param-row"><label>前カーブ</label><input type="range" id="farFront" min="-0.5" max="0.5" step="0.01" value="0.40"><span id="val_farFront">0.40</span></div>
                    <div class="param-row"><label>後カーブ</label><input type="range" id="farBack" min="-0.5" max="0.5" step="0.01" value="-0.14"><span id="val_farBack">-0.14</span></div>
                    <div class="param-row"><label>長さ</label><input type="range" id="farLength" min="0.5" max="5.0" step="0.05" value="2.60"><span id="val_farLength">2.60</span></div>
                    <div class="param-row"><label>根元丸み</label><input type="range" id="farRoot" min="-2.0" max="2.0" step="0.01" value="2.00"><span id="val_farRoot">2.00</span></div>
                </div>
                <div class="param-col">
                    <h4>手前の角 (Near Horn)</h4>
                    <div class="param-row"><label>根元X</label><input type="range" id="nearBaseX" min="-1.0" max="1.0" step="0.01" value="-0.24"><span id="val_nearBaseX">-0.24</span></div>
                    <div class="param-row"><label>根元Y</label><input type="range" id="nearBaseY" min="0.0" max="1.5" step="0.01" value="0.69"><span id="val_nearBaseY">0.69</span></div>
                    <div class="param-row"><label>角度</label><input type="range" id="nearAngle" min="-180" max="180" step="1" value="-7"><span id="val_nearAngle">-7</span></div>
                    <div class="param-row"><label>先端X</label><input type="range" id="nearTipX" min="-1.0" max="1.0" step="0.01" value="0.22"><span id="val_nearTipX">0.22</span></div>
                    <div class="param-row"><label>前カーブ</label><input type="range" id="nearFront" min="-0.5" max="1.0" step="0.01" value="-0.10"><span id="val_nearFront">-0.10</span></div>
                    <div class="param-row"><label>後カーブ</label><input type="range" id="nearBack" min="-0.5" max="1.0" step="0.01" value="0.28"><span id="val_nearBack">0.28</span></div>
                    <div class="param-row"><label>長さ</label><input type="range" id="nearLength" min="0.5" max="5.0" step="0.05" value="2.60"><span id="val_nearLength">2.60</span></div>
                    <div class="param-row"><label>根元丸み</label><input type="range" id="nearRoot" min="-2.0" max="2.0" step="0.01" value="2.00"><span id="val_nearRoot">2.00</span></div>
                </div>
            </div>
        </details>
    </div>

    <script type="module">
        import { Shogun } from './js/boss.js';
        import { Player } from './js/player.js';
        import { createSubWeapon } from './js/weapon.js';
        import { input } from './js/input.js';

        window.hornParams = {
            farBaseX: -0.03, farBaseY: 0.18, farAngle: 7.00, farTipX: 0.20, farFront: 0.40, farBack: -0.14, farLength: 2.60, farRoot: 2.00,
            nearBaseX: -0.24, nearBaseY: 0.69, nearAngle: -7.00, nearTipX: 0.22, nearFront: -0.10, nearBack: 0.28, nearLength: 2.60, nearRoot: 2.00
        };

        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        
        // 高解像度（Retina）対応
        const dpr = window.devicePixelRatio || 1;
        const logicalW = 800;
        const logicalH = 500;
        canvas.width = logicalW * dpr;
        canvas.height = logicalH * dpr;
        ctx.scale(dpr, dpr);
        
        window.game = {
            scrollX: 0,
            groundY: 400,
            projectiles: [],
            camera: { x: 0, y: 0 },
            difficulty: { id: 'normal' },
            audio: { play: () => {}, tryPlay: () => {}, stop: () => {}, setVolume: () => {} }
        };
        const shogun = new Shogun(logicalW / 2, window.game.groundY, 'boss', window.game.groundY);
        shogun.init();
        shogun.hp = 99999;
        shogun.isEnemy = false;
        shogun.facingRight = true;
        shogun.actor.characterType = 'shogun';
        shogun.actor.scaleMultiplier = 1.0; 

        const ninja = new Player(logicalW / 2, window.game.groundY, window.game.groundY);
        ninja.previewMode = true;
        ninja.facingRight = true;
        ninja.progression = { normalCombo: 3, subWeapon: 3, specialClone: 3 };
        
        const subWeaponNames = {
            shuriken: '手裏剣', bomb: '火薬玉', spear: '大槍', dual: '二刀流', kusarigama: '鎖鎌', odachi: '大太刀'
        };
        const subWeapons = ['shuriken', 'bomb', 'spear', 'dual', 'kusarigama', 'odachi'];
        ninja.subWeapons = subWeapons.map(key => createSubWeapon(subWeaponNames[key])).filter(Boolean);
        ninja.currentSubWeapon = ninja.subWeapons[0];
        
        let lastTime = performance.now();
        let isPreviewPaused = false;
        let isWalking = false;
        let isDashing = false;
        let walkDirection = 0;
        let previewCharacter = 'shogun';
        let subIndex = 0;
        const heldKeys = new Set();

        const updateUI = () => {
            const weaponLabel = document.getElementById('selectedSubWeapon');
            weaponLabel.textContent = subWeaponNames[subWeapons[subIndex]] || '---';
            document.getElementById('btnModeShogun').classList.toggle('active', previewCharacter === 'shogun');
            document.getElementById('btnModeNinja').classList.toggle('active', previewCharacter === 'ninja');
            const actor = previewCharacter === 'shogun' ? shogun : ninja;
            const ougiActive = previewCharacter === 'shogun' ? shogun._ougiActive : (ninja.specialActive || ninja.specialCasting);
            document.getElementById('btnOugi').classList.toggle('active', !!ougiActive);
            
            // モードに応じたUIカラーの変更
            document.body.classList.toggle('mode-ninja', previewCharacter === 'ninja');
            // 将軍のパラメータ調整エリアの表示制御
            document.getElementById('tuningSection').style.display = previewCharacter === 'shogun' ? 'block' : 'none';
        };

        const switchChar = (mode) => {
            previewCharacter = mode;
            window.game.player = previewCharacter === 'shogun' ? shogun : ninja;
            window.game.player.x = (logicalW - window.game.player.width) / 2;
            window.game.player.y = window.game.groundY - window.game.player.height;
            if (previewCharacter === 'shogun') { shogun._subWeaponKey = subWeapons[subIndex]; }
            updateUI();
        };

        document.getElementById('btnModeShogun').addEventListener('click', () => switchChar('shogun'));
        document.getElementById('btnModeNinja').addEventListener('click', () => switchChar('ninja'));
        
        document.getElementById('selectedSubWeapon').addEventListener('click', () => {
            subIndex = (subIndex + 1) % subWeapons.length;
            if (previewCharacter === 'shogun') { shogun._subWeaponKey = subWeapons[subIndex]; }
            else {
                const name = subWeaponNames[subWeapons[subIndex]];
                const idx = ninja.subWeapons.findIndex(w => w.name === name);
                if (idx >= 0) { ninja.subWeaponIndex = idx; ninja.currentSubWeapon = ninja.subWeapons[idx]; }
            }
            updateUI();
        });

        document.getElementById('btnOugi').addEventListener('click', () => {
            if (previewCharacter === 'shogun') {
                shogun._ougiActive = !shogun._ougiActive;
                if (shogun._ougiActive) shogun.actor.rebuildSpecialCloneSlots();
            } else {
                if (ninja.specialActive) ninja.clearSpecialState(true);
                else { ninja.specialGauge = 100; ninja.useSpecial(); }
            }
            updateUI();
        });

        document.getElementById('btnOonagi').addEventListener('click', (e) => {
            const active = e.currentTarget.classList.toggle('active');
            ninja.tempNinjutsuTimers.xAttack = active ? 60000 : 0;
            shogun.tempNinjutsuTimers = { xAttack: active ? 60000 : 0 };
        });

        document.getElementById('btnKakuremi').addEventListener('click', (e) => {
            const active = e.currentTarget.classList.toggle('active');
            ninja.tempNinjutsuTimers.ghostVeil = active ? 60000 : 0;
            shogun.ghostVeilAlpha = active ? 0.0 : 1.0;
        });

        document.getElementById('selSkillLv').addEventListener('change', (e) => {
            const lv = parseInt(e.target.value);
            [ninja, shogun.actor].forEach(a => {
                a.progression = { normalCombo: lv, subWeapon: lv, specialClone: lv };
                if (a.refreshSubWeaponScaling) a.refreshSubWeaponScaling();
                if (a.rebuildSpecialCloneSlots) a.rebuildSpecialCloneSlots();
            });
            e.target.blur();
        });

        Object.keys(window.hornParams).forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', (e) => {
                    const v = parseFloat(e.target.value);
                    window.hornParams[id] = v;
                    document.getElementById('val_' + id).textContent = v.toFixed(2);
                });
            }
        });

        document.getElementById('btnRestart').addEventListener('click', () => location.reload());

        // ゲーム準拠のキーボード操作
        window.addEventListener('keydown', (e) => {
            if (['INPUT', 'SELECT'].includes(document.activeElement.tagName)) return;
            const k = e.key.toLowerCase();
            heldKeys.add(k);
            if (k === 'z') { if (previewCharacter === 'shogun') shogun._startNextComboStep(); else ninja.attack(); e.preventDefault(); }
            if (k === 'x') { if (previewCharacter === 'shogun') shogun._fireSubWeapon(shogun._subWeaponKey); else ninja.useSubWeapon(); e.preventDefault(); }
            if (k === 's') { document.getElementById('btnOugi').click(); e.preventDefault(); }
            if (k === 'c') { document.getElementById('selectedSubWeapon').click(); e.preventDefault(); }
            if (k === 'shift') { isDashing = true; isWalking = true; walkDirection = window.game.player.facingRight ? 1 : -1; e.preventDefault(); }
            if (k === 'arrowleft') { walkDirection = -1; isWalking = true; e.preventDefault(); }
            if (k === 'arrowright') { walkDirection = 1; isWalking = true; e.preventDefault(); }
            if (k === 'arrowup' || e.key === ' ') { if (window.game.player.isGrounded) { window.game.player.vy = -14; window.game.player.isGrounded = false; } e.preventDefault(); }
            if (k === 'arrowdown') { isWalking = false; walkDirection = 0; e.preventDefault(); }
            updateUI();
        });

        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            heldKeys.delete(k);
            if (k === 'shift') isDashing = false;
            if (k === 'arrowleft' || k === 'arrowright') {
                if (!heldKeys.has('arrowleft') && !heldKeys.has('arrowright')) { isWalking = false; walkDirection = 0; }
            }
            updateUI();
        });

        document.querySelectorAll('button').forEach(el => {
            el.addEventListener('mouseup', () => el.blur());
        });
        document.querySelectorAll('select, input').forEach(el => {
            el.addEventListener('change', () => el.blur());
        });

        function loop(time) {
            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;
            if (!isPreviewPaused) {
                const actor = window.game.player;
                if (isWalking && walkDirection !== 0) {
                    actor.vx = walkDirection * (isDashing ? 8 : 4);
                    actor.facingRight = walkDirection > 0;
                } else { actor.vx *= 0.8; }
                if (previewCharacter === 'shogun') shogun.update(dt, null, [], []);
                else ninja.update(dt, [], []);
                if (actor.x < -100) actor.x = logicalW + 100;
                if (actor.x > logicalW + 100) actor.x = -100;
                window.game.projectiles.forEach(p => { if (p.update) p.update(dt, window.game.groundY, []); });
                window.game.projectiles = window.game.projectiles.filter(p => !p.isDead && !p.isDestroyed);
            }
            // 背景・空 (少し明るめに調整)
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(0, 0, logicalW, logicalH);
            // 地面 (空より明るめ)
            ctx.fillStyle = '#444';
            ctx.fillRect(0, window.game.groundY, logicalW, logicalH - window.game.groundY);
            
            // ガイド線 (中心線)
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            // 垂直中心線
            ctx.beginPath(); ctx.moveTo(logicalW / 2, 0); ctx.lineTo(logicalW / 2, logicalH); ctx.stroke();
            // 地面水平線
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath(); ctx.moveTo(0, window.game.groundY); ctx.lineTo(logicalW, window.game.groundY); ctx.stroke();
            window.game.projectiles.forEach(p => { if (p.render) p.render(ctx); });
            if (previewCharacter === 'shogun') {
                shogun.renderBody(ctx);
                if (shogun._ougiActive && shogun.actor) shogun.actor.renderSpecial(ctx, {});
            } else ninja.render(ctx);
            requestAnimationFrame(loop);
        }
        switchChar('shogun');
        requestAnimationFrame(loop);
    </script>
</body>
</html>
