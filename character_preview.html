<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>天下統一 - キャラクタープレビュー</title>
    <link rel="icon" type="image/png" href="./icon/icon.png">
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #1a1a1a;
            --accent: #dcb854; /* 将軍ゴールド */
            --accent-glow: rgba(220, 184, 84, 0.4);
            --text: #e0e0e0;
            --text-muted: #888;
            --border: #333;
            --btn: #2a2a2a;
            --btn-hover: #3a3a3a;
            --btn-active: #735c21;
        }

        :focus {
            outline: none !important;
            box-shadow: none !important;
        }

        body.mode-ninja {
            --accent: #00bfff; /* 忍者の鉢巻色 (DeepSkyBlue) */
            --accent-glow: rgba(0, 191, 255, 0.4);
            --btn-active: #0080af;
        }

        body {
            background-color: var(--bg); 
            color: var(--text); 
            text-align: center; 
            font-family: 'Outfit', 'Inter', 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
            overflow-x: hidden;
        }
        .btn-action.active {
            background: #bbb !important;
            color: #000 !important;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2) !important;
            border-color: #eee !important;
        }

        .preview-app {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .top-panel {
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-row {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .canvas-container {
            position: relative;
            background: linear-gradient(to bottom, #333, #111);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 100%;
            margin: 0 auto;
        }

        canvas { 
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1280 / 720;
            image-rendering: pixelated;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        :focus {
            outline: none !important;
        }

        .weapon-info {
            background: #111;
            border: 1px solid var(--border);
            padding: 0 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            color: var(--accent);
            min-width: 100px;
            height: 35px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        button, select {
            height: 35px;
            box-sizing: border-box;
            margin: 0;
        }
        .pill-toggle {
            height: 37px;
            box-sizing: border-box;
            margin: 0;
        }

        button { 
            background: var(--btn);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.1s ease;
            outline: none;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover, .weapon-info:hover, select:hover, .pill-toggle button:hover {
            filter: brightness(1.2);
            border-color: #777;
        }

        button:active, .weapon-info:active, .pill-toggle button:active {
            transform: scale(0.97);
            filter: brightness(0.9);
        }

        button.active {
            background: var(--btn-active);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none !important;
            filter: none !important;
        }

        .pill-toggle {
            position: relative;
            display: flex;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 140px;
            overflow: hidden;
        }

        .pill-toggle .pill-bg {
            position: absolute;
            top: 2px;
            left: 2px;
            width: calc(50% - 4px);
            height: calc(100% - 4px);
            background: var(--accent);
            border-radius: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        body:not(.mode-ninja) .pill-toggle .pill-bg {
            transform: translateX(calc(100% + 4px));
        }

        .pill-toggle button {
            position: relative;
            flex: 1;
            border: none;
            background: transparent !important;
            color: #888;
            z-index: 1;
            box-shadow: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: normal;
            padding: 0;
        }

        .pill-toggle button.active {
            color: #000 !important;
        }

        select {
            background: #222;
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%20%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23888%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            padding-right: 30px;
        }

        summary {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
        }

        .tuning-grid {
            background: #111;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
        }

        .param-col h4 {
            margin: 0 0 10px 0;
            color: var(--accent);
            font-size: 11px;
            text-transform: uppercase;
            border-bottom: 1px solid #222;
            padding-bottom: 4px;
        }

        .param-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 11px;
        }

        .param-row label { width: 130px; color: #999; flex-shrink: 0; }
        .param-row input { flex: 1; min-width: 60px; accent-color: var(--accent); }
        .param-row span { width: 40px; text-align: right; color: var(--accent); font-family: monospace; font-weight: bold; flex-shrink: 0; }

        @media (max-width: 700px) {
            .tuning-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="mode-ninja">
    <div class="preview-app">
        <header class="top-panel">
            <div class="panel-row">
                <div class="pill-toggle">
                    <div class="pill-bg"></div>
                    <button id="btnModeNinja" class="active">忍者</button>
                    <button id="btnModeShogun">将軍</button>
                </div>
                <div class="control-group">
                    <div id="selectedSubWeapon" class="weapon-info" title="クリックで忍具切替">---</div>
                </div>
                <div class="control-group">
                    <label style="color:#aaa;font-size:11px;margin-right:2px;">忍具Lv</label>
                    <select id="selWeaponLv">
                        <option value="0">初級</option>
                        <option value="1">中級</option>
                        <option value="2">上級</option>
                        <option value="3" selected>特級</option>
                    </select>
                    <label style="color:#aaa;font-size:11px;margin:0 2px 0 6px;">奥義Lv</label>
                    <select id="selSkillLv">
                        <option value="0">初級</option>
                        <option value="1">中級</option>
                        <option value="2">上級</option>
                        <option value="3" selected>特級</option>
                    </select>
                </div>
                <button id="btnOugi" class="btn-action">奥義</button>
                <button id="btnOonagi" class="btn-action">大薙</button>
                <button id="btnKakuremi" class="btn-action">隠れ身</button>
                <button id="btnRestart" style="background:#442222;">リセット</button>
            </div>
            <div class="panel-row" style="gap:18px; align-items:center;">
                <label style="display:flex; align-items:center; gap:6px;">
                    スピード
                    <input type="range" id="motionSpeed" min="0.05" max="1" step="0.05" value="1">
                    <span id="motionSpeedVal" style="min-width:42px;">1.00x</span>
                </label>
                <label style="display:flex; align-items:center; gap:6px;">
                    ズーム
                    <input type="range" id="viewZoom" min="0.3" max="1.5" step="0.05" value="1">
                    <span id="viewZoomVal" style="min-width:42px;">1.00x</span>
                </label>
                <button id="btnStepBackFrame" class="btn-action" title="一時停止中に1フレーム戻す">コマ戻し</button>
                <button id="btnStepFrame" class="btn-action" title="一時停止中に1フレーム進める">コマ送り</button>
                <button id="btnHideArmor" class="btn-action" title="将軍の鎧・兜を非表示にして素体の四肢の重ね順を確認">防具非表示</button>
            </div>
        </header>

        <div class="canvas-container">
            <canvas id="previewCanvas" width="800" height="500"></canvas>
        </div>

        <details id="tuningSection" open>
            <summary>将軍の角調整</summary>
            <div class="tuning-grid">
                <div class="param-col" id="tuningColFar">
                    <h4>奥の角 (Far Horn)</h4>
                </div>
                <div class="param-col" id="tuningColNear">
                    <h4>手前の角 (Near Horn)</h4>
                </div>
            </div>
        </details>
    </div>

    <script type="module">
        // 描画系・戦闘ヘルパは頻繁に編集するため、ESモジュールキャッシュ対策として
        // バージョン付きdynamic importで毎回最新を取得する（bare URL の静的importは
        // ブラウザのモジュールマップに固定され更新されないため）。
        const _bustParam = new URLSearchParams(location.search).get('_t') || String(Date.now());
        const { Player } = await import('./js/player.js?v=' + _bustParam);
        const { game } = await import('./js/game.js?v=' + _bustParam);
        const { createSubWeapon } = await import('./js/weapon.js?v=' + _bustParam);
        const { input } = await import('./js/input.js?v=' + _bustParam);
        console.log('[character_preview.html] Imported input instance:', input ? input.instanceId : 'undefined');
        const { GAME_STATE } = await import('./js/constants.js?v=' + _bustParam);
        const { applyShogunCombat } = await import('./js/shogunCombatHelper.js?v=' + _bustParam);

        // --- ゲーム実体 & 初期化 ---
        const logicalW = 1280;
        const logicalH = 720;
        const groundY = 480;

        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = logicalW * dpr;
        canvas.height = logicalH * dpr;
        ctx.scale(dpr, dpr);
        game.canvas = canvas;
        game.ctx = ctx;
        game.currentStageNumber = 1;
        game.groundY = groundY;
        game.scrollX = 0;
        game.cameraY = 0;
        game.state = GAME_STATE.PLAYING;
        game.pauseReturnState = GAME_STATE.PLAYING;
        game.bombs = [];
        game.shockwaves = [];
        game.effects = [];
        game.hitEffects = [];
        game.damageNumbers = [];
        game.expGems = [];
        game.stageBossDefeatEffects = [];
        window.game = game;
        input.setCanvas(canvas);
        if (typeof game.updateInputScale === 'function') game.updateInputScale();

        const subWeaponNames = {
            shuriken: '手裏剣', bomb: '火薬玉', spear: '大槍', dual: '二刀流', kusarigama: '鎖鎌', odachi: '大太刀'
        };
        const subWeapons = ['shuriken', 'bomb', 'spear', 'dual', 'kusarigama', 'odachi'];

        // ===== 将軍 = ゲームの実プレイアブル将軍（Player + applyShogunCombat）=====
        // E5 で boss(Shogunクラス)は撤去。将軍は単一 Player ネイティブで戦闘/描画/座標を担う。
        // 既存コードの shogun.* 参照は shogunPlayer 自身を指すエイリアス(下で定義)で互換維持する。
        const shogunPlayer = new Player(logicalW / 2 - 24, groundY - 72, groundY);
        shogunPlayer.characterType = 'shogun';
        shogunPlayer.progression = { normalCombo: 3, subWeapon: 3, specialClone: 3 };
        applyShogunCombat(shogunPlayer);        // ゲーム側と同じ経路で将軍戦闘コントローラを確認
        shogunPlayer.previewMode = false;       // 実ゲームと同じ入力・物理
        shogunPlayer.facingRight = true;
        shogunPlayer.maxJumps = 3;              // 三段跳び
        shogunPlayer._previewFreeMovement = true; // 画面端ループ/ズーム引きのためカメラ境界クランプを無効化
        shogunPlayer.subWeapons = subWeapons.map(key => createSubWeapon(subWeaponNames[key])).filter(Boolean);
        shogunPlayer.currentSubWeapon = shogunPlayer.subWeapons[0] || null;
        shogunPlayer.subWeaponIndex = 0;
        // 初回 update で将軍 setup（dims=素体40x60＋scaleMultiplier、ネイティブ戦闘/描画へ移行）が走る。
        // 忍具を先に持たせ、実ゲームと同じ初回スケール適用順にする。
        shogunPlayer.update(1 / 60, [], []);
        // 既存の shogun.*（位置同期/busy判定/防具非表示）参照の互換用エイリアス。
        const shogun = shogunPlayer;

        // プレビュー初期位置を画面中央に揃える。spawn は忍者幅(48)基準なので、構築後の実ワールド幅(88)で中央寄せする。
        shogunPlayer.x = logicalW / 2 - shogunPlayer.getWorldWidth() / 2;
        shogunPlayer.vx = 0; // 初回 setup update で付いた速度を消し、中央で静止させる（起動時の横ドリフト防止）

        const ninja = new Player(logicalW / 2 - 24, groundY - 72, groundY);
        // 実ゲームと同じ挙動を再現するため previewMode=false。
        // 移動・ジャンプ・ダッシュ・しゃがみ・攻撃・忍具・奥義はすべて ninja.update→handleInput が
        // ゲームと同じロジックで処理する（プレビュー専用の手動移動/摩擦は廃止）。
        ninja.previewMode = false;
        ninja.facingRight = true;
        ninja.maxJumps = 3;    // プレビューは三段跳びをデフォルトに
        ninja._previewFreeMovement = true; // 画面端ループ/ズーム引きのため通常の左端クランプを無効化
        ninja.progression = { normalCombo: 3, subWeapon: 3, specialClone: 3 };
        ninja.x = logicalW / 2 - ninja.width / 2; // 初期位置を画面中央に揃える

        ninja.subWeapons = subWeapons.map(key => createSubWeapon(subWeaponNames[key])).filter(Boolean);
        ninja.currentSubWeapon = ninja.subWeapons[0];
        ninja.subWeaponIndex = 0;
        // [E3] プレイアブル将軍を Player ネイティブ戦闘＋描画に切替（boss 非依存）。
        // dims/scale は上の初回 update(409) で設定済み。忍具の有効値は refreshSubWeaponScaling に集約する。
        if (typeof shogunPlayer.enableNativeShogun === 'function') shogunPlayer.enableNativeShogun();
        game.player = ninja;
        game.initStage(1);

        // --- 状態変数 ---
        let previewCharacter = 'ninja';
        let lastTime = performance.now();
        let subIndex = 0;
        let isPaused = false;
        Object.defineProperty(window, 'isPaused', {
            get: () => isPaused,
            set: (val) => { isPaused = val; }
        });
        window.lastNinjaSubIndex = -1;
        window._previewWeapon = subWeapons[0];
        const equipShogunPreviewWeapon = (key) => {
            const weaponName = subWeaponNames[key];
            const idx = shogunPlayer.subWeapons.findIndex(w => w && w.name === weaponName);
            if (idx === -1) return false;
            shogunPlayer.subWeaponIndex = idx;
            shogunPlayer.currentSubWeapon = shogunPlayer.subWeapons[idx];
            return true;
        };
        const previewActors = () => [ninja, shogunPlayer].filter(Boolean);
        const PREVIEW_EFFECT_HOLD_MS = 60000;
        const previewEffectState = {
            ougi: false,
            oonagi: false,
            kakuremi: false
        };

        const isShogunMode = () => previewCharacter === 'shogun';
        const getActiveActor = () => isShogunMode() ? shogunPlayer : ninja;
        const isPreviewSpecialActive = (actor) => !!(
            actor && (actor.isUsingSpecial || actor.specialActive || actor.specialCasting || actor.specialCastTimer > 0)
        );
        const setPreviewSpecialActive = (actor, active) => {
            if (!actor) return;
            if (active) {
                if (!isPreviewSpecialActive(actor)) {
                    actor.specialGauge = actor.maxSpecialGauge || 100;
                    actor.useSpecial();
                }
            } else if (isPreviewSpecialActive(actor) && typeof actor.clearSpecialState === 'function') {
                actor.clearSpecialState(true);
            }
        };
        const setPreviewTempNinjutsuActive = (actor, key, active) => {
            if (!actor || !actor.tempNinjutsuTimers) return;
            actor.tempNinjutsuTimers[key] = active ? PREVIEW_EFFECT_HOLD_MS : 0;
        };
        const applyPreviewEffectState = (actor) => {
            setPreviewSpecialActive(actor, previewEffectState.ougi);
            setPreviewTempNinjutsuActive(actor, 'xAttack', previewEffectState.oonagi);
            setPreviewTempNinjutsuActive(actor, 'ghostVeil', previewEffectState.kakuremi);
        };
        const clearPreviewEffectOnAllActors = (effectKey) => {
            previewActors().forEach((actor) => {
                if (effectKey === 'ougi') setPreviewSpecialActive(actor, false);
                if (effectKey === 'oonagi') setPreviewTempNinjutsuActive(actor, 'xAttack', false);
                if (effectKey === 'kakuremi') setPreviewTempNinjutsuActive(actor, 'ghostVeil', false);
            });
        };
        const syncGameState = () => {
            const actor = getActiveActor();
            game.player = actor;
            game.groundY = groundY;
            game.scrollX = 0;
            game.cameraY = 0;
            game.state = isPaused ? GAME_STATE.PAUSED : GAME_STATE.PLAYING;
            if (game.stage) {
                game.stage.groundY = groundY;
                game.stage.progress = game.scrollX;
                game.stage.enemies = [];
                game.stage.obstacles = [];
                game.stage.boss = null;
                game.stage.bossSpawned = false;
            }
            return actor;
        };
        const updateUI = () => {
            document.getElementById('btnModeShogun').classList.toggle('active', isShogunMode());
            document.getElementById('btnModeNinja').classList.toggle('active', !isShogunMode());
            document.body.classList.toggle('mode-ninja', !isShogunMode());
            document.getElementById('tuningSection').style.display = isShogunMode() ? 'block' : 'none';
            
            document.getElementById('btnOugi').classList.toggle('active', previewEffectState.ougi);
            document.getElementById('btnOonagi').classList.toggle('active', previewEffectState.oonagi);
            document.getElementById('btnKakuremi').classList.toggle('active', previewEffectState.kakuremi);

            const key = isShogunMode() ? window._previewWeapon : subWeapons[subIndex];
            const weaponName = isShogunMode()
                ? (shogunPlayer.currentSubWeapon?.name || subWeaponNames[key] || 'なし')
                : (ninja.currentSubWeapon?.name || 'なし');
            document.getElementById('selectedSubWeapon').textContent = weaponName;
        };

        const switchChar = (mode) => {
            if (previewCharacter === mode) {
                const actor = syncGameState();
                applyPreviewEffectState(actor);
                updateUI();
                return;
            }
            const prevMode = previewCharacter;
            previewCharacter = mode;
            
            // 将軍と忍者の忍具インデックスを同期させる
            if (mode === 'ninja' && prevMode === 'shogun') {
                const targetKey = subWeapons[subIndex];
                const nIdx = ninja.subWeapons.findIndex(w => {
                    const key = Object.keys(subWeaponNames).find(k => subWeaponNames[k] === w.name);
                    return key === targetKey;
                });
                if (nIdx !== -1) {
                    ninja.subWeaponIndex = nIdx;
                    ninja.currentSubWeapon = ninja.subWeapons[nIdx];
                }
            } else if (mode === 'shogun' && prevMode === 'ninja') {
                const currentName = ninja.currentSubWeapon?.name;
                const targetKey = Object.keys(subWeaponNames).find(k => subWeaponNames[k] === currentName);
                if (targetKey) {
                    subIndex = subWeapons.indexOf(targetKey);
                    if (subIndex === -1) subIndex = 0;
                    window._previewWeapon = subWeapons[subIndex];
                    equipShogunPreviewWeapon(window._previewWeapon);
                }
            }

            const actor = syncGameState();
            // 中央寄せは構築時と同じ計算に統一する。
            actor.x = logicalW / 2 - actor.getWorldWidth() / 2;
            const laneOffset = 32; // LANE_OFFSET と一貫
            actor.y = groundY + laneOffset - actor.getWorldHeight();
            actor.vx = 0; actor.vy = 0;
            if (mode === 'shogun' && shogun) { shogun.x = actor.x; shogun.vx = 0; }
            applyPreviewEffectState(actor);
            updateUI();
        };

        // --- 角パラメータ UI ---
        window.hornParams = {
            farBaseX: -0.03, farBaseY: 0.18, farAngle: 7.00, farTipX: 0.20, farFront: 0.40, farBack: -0.14, farLength: 2.60, farRoot: 2.00,
            nearBaseX: -0.24, nearBaseY: 0.69, nearAngle: -7.00, nearTipX: 0.22, nearFront: -0.10, nearBack: 0.28, nearLength: 2.60, nearRoot: 2.00
        };
        const buildParams = (prefix, containerId) => {
            const container = document.getElementById(containerId);
            const keys = ['BaseX', 'BaseY', 'Angle', 'TipX', 'Front', 'Back', 'Length', 'Root'];
            keys.forEach(k => {
                const id = prefix + k;
                const row = document.createElement('div');
                row.className = 'param-row';
                const isAngle = k === 'Angle';
                const min = isAngle ? -180 : -1;
                const max = isAngle ? 180 : 5;
                row.innerHTML = `<label>${k}</label><input type="range" id="${id}" min="${min}" max="${max}" step="0.01" value="${window.hornParams[id]}"><span id="val_${id}">${window.hornParams[id]}</span>`;
                container.appendChild(row);
                const input = row.querySelector('input');
                const span = row.querySelector('span');
                input.addEventListener('input', (e) => {
                    const v = parseFloat(e.target.value);
                    window.hornParams[id] = v;
                    span.textContent = v.toFixed(2);
                });
            });
        };
        buildParams('far', 'tuningColFar');
        buildParams('near', 'tuningColNear');

        const cycleSubWeapon = () => {
            if (isShogunMode()) {
                // UI選択をサイクル。実ゲームと同じくプレイヤー側 currentSubWeapon へ装備する
                subIndex = (subIndex + 1) % subWeapons.length;
                window._previewWeapon = subWeapons[subIndex];
                equipShogunPreviewWeapon(window._previewWeapon);
            } else {
                ninja.switchSubWeapon();
                window._previewWeapon = ninja.currentSubWeapon ? subWeapons[ninja.subWeaponIndex] : null;
            }
            updateUI();
        };

        // --- イベントリスナー ---
        document.getElementById('btnModeShogun').addEventListener('click', () => switchChar('shogun'));
        document.getElementById('btnModeNinja').addEventListener('click', () => switchChar('ninja'));
        document.getElementById('btnOugi').addEventListener('click', () => {
            previewEffectState.ougi = !previewEffectState.ougi;
            if (previewEffectState.ougi) {
                applyPreviewEffectState(getActiveActor());
            } else {
                clearPreviewEffectOnAllActors('ougi');
            }
            updateUI();
        });
        document.getElementById('btnOonagi').addEventListener('click', () => {
            previewEffectState.oonagi = !previewEffectState.oonagi;
            if (previewEffectState.oonagi) {
                previewActors().forEach((actor) => setPreviewTempNinjutsuActive(actor, 'xAttack', true));
            } else {
                clearPreviewEffectOnAllActors('oonagi');
            }
            updateUI();
        });
        document.getElementById('btnKakuremi').addEventListener('click', () => {
            previewEffectState.kakuremi = !previewEffectState.kakuremi;
            if (previewEffectState.kakuremi) {
                previewActors().forEach((actor) => setPreviewTempNinjutsuActive(actor, 'ghostVeil', true));
            } else {
                clearPreviewEffectOnAllActors('kakuremi');
            }
            updateUI();
        });
        document.getElementById('btnRestart').addEventListener('click', () => {
            // ESモジュールのキャッシュをバイパスするためURLにタイムスタンプを付与
            const url = new URL(location.href);
            url.searchParams.set('_t', Date.now());
            location.replace(url.toString());
        });
        document.getElementById('selectedSubWeapon').addEventListener('click', cycleSubWeapon);

        // --- 強化レベル同期 ---
        // 忍具Lv(subWeapon) と 奥義Lv(specialClone) は実ゲームでは別々に存在するため、
        // プレビューでも個別に設定できるようにする（normalComboは忍具Lvに追従）。
        const applyWeaponLv = (t) => {  // 忍具Lv: 武器強化段(enhanceTier) + 通常コンボLv
            ninja.progression.subWeapon = t;
            ninja.progression.normalCombo = t;
            ninja.subWeapons.forEach(w => { if(w.applyEnhanceTier) w.applyEnhanceTier(t); });
            if (typeof ninja.refreshSubWeaponScaling === 'function') ninja.refreshSubWeaponScaling();
            if (shogunPlayer && shogunPlayer.progression) {
                shogunPlayer.progression.subWeapon = t;
                shogunPlayer.progression.normalCombo = t;
                if (typeof shogunPlayer.refreshSubWeaponScaling === 'function') shogunPlayer.refreshSubWeaponScaling();
            }
        };
        const applySkillLv = (t) => {  // 奥義Lv: 分身の体数・自律AI
            ninja.progression.specialClone = t;
            if (typeof ninja.rebuildSpecialCloneSlots === 'function') ninja.rebuildSpecialCloneSlots();
            if (shogunPlayer && shogunPlayer.progression) {
                shogunPlayer.progression.specialClone = t;
                if (typeof shogunPlayer.rebuildSpecialCloneSlots === 'function') shogunPlayer.rebuildSpecialCloneSlots();
            }
        };
        // 後方互換: 既存呼び出し用に両方を一括設定するヘルパーも残す
        const updateAllTiers = (tier) => { const t = parseInt(tier); applyWeaponLv(t); applySkillLv(t); };

        document.getElementById('selWeaponLv').addEventListener('change', (e) => {
            applyWeaponLv(parseInt(e.target.value));
        });
        document.getElementById('selSkillLv').addEventListener('change', (e) => {
            applySkillLv(parseInt(e.target.value));
        });

        // --- デバッグ: コマ戻し用の軽量スナップショット ---
        const PREVIEW_HISTORY_LIMIT = 180;
        const previewHistory = [];
        const PREVIEW_SNAPSHOT_SKIP_KEYS = new Set([
            'combatController',
            '_shogunCombatController',
            '_getShogunRealSubWeapon',
            'subWeapons',
            'currentSubWeapon',
            'owner',
            'target',
            '_sourceProjectile',
            'hitEnemies',
            'lastHitMap',
            'projectiles',
            'cloneProjectiles',
            'specialCloneTargets',
            'specialCloneSubWeaponInstances',
            'specialCloneSubWeaponOwners'
        ]);
        const clonePreviewValue = (value, seen = new WeakSet()) => {
            if (value === null || typeof value !== 'object') return value;
            if (typeof Node !== 'undefined' && value instanceof Node) return undefined;
            if (value instanceof Map || value instanceof Set) return undefined;
            if (seen.has(value)) return undefined;
            seen.add(value);
            if (Array.isArray(value)) {
                return value.map((entry) => clonePreviewValue(entry, seen));
            }
            const out = {};
            Object.keys(value).forEach((key) => {
                if (PREVIEW_SNAPSHOT_SKIP_KEYS.has(key)) return;
                const cloned = clonePreviewValue(value[key], seen);
                if (cloned !== undefined) out[key] = cloned;
            });
            return out;
        };
        const restorePreviewValue = (target, snapshot) => {
            if (snapshot === null || typeof snapshot !== 'object') return snapshot;
            if (Array.isArray(snapshot)) {
                if (!Array.isArray(target)) return clonePreviewValue(snapshot);
                target.length = snapshot.length;
                snapshot.forEach((entry, index) => {
                    target[index] = restorePreviewValue(target[index], entry);
                });
                return target;
            }
            if (!target || typeof target !== 'object' || Array.isArray(target)) {
                return clonePreviewValue(snapshot);
            }
            Object.keys(snapshot).forEach((key) => {
                if (PREVIEW_SNAPSHOT_SKIP_KEYS.has(key)) return;
                target[key] = restorePreviewValue(target[key], snapshot[key]);
            });
            return target;
        };
        const captureActorSnapshot = (actor) => {
            const props = {};
            Object.keys(actor).forEach((key) => {
                if (PREVIEW_SNAPSHOT_SKIP_KEYS.has(key)) return;
                const cloned = clonePreviewValue(actor[key]);
                if (cloned !== undefined) props[key] = cloned;
            });
            return {
                props,
                subWeaponIndex: actor.subWeaponIndex,
                currentSubWeaponState: clonePreviewValue(actor.currentSubWeapon)
            };
        };
        const restoreActorSnapshot = (actor, snapshot) => {
            if (!actor || !snapshot) return;
            restorePreviewValue(actor, snapshot.props);
            if (Number.isInteger(snapshot.subWeaponIndex) && actor.subWeapons[snapshot.subWeaponIndex]) {
                actor.subWeaponIndex = snapshot.subWeaponIndex;
                actor.currentSubWeapon = actor.subWeapons[snapshot.subWeaponIndex];
            }
            if (actor.currentSubWeapon && snapshot.currentSubWeaponState) {
                restorePreviewValue(actor.currentSubWeapon, snapshot.currentSubWeaponState);
            }
        };
        const updateStepBackButton = () => {
            const btn = document.getElementById('btnStepBackFrame');
            if (btn) btn.disabled = previewHistory.length === 0;
        };
        const capturePreviewSnapshot = () => ({
            previewCharacter,
            subIndex,
            previewWeapon: window._previewWeapon,
            previewEffectState: { ...previewEffectState },
            simAccum: window.__simAccum || 0,
            ninja: captureActorSnapshot(ninja),
            shogun: captureActorSnapshot(shogunPlayer)
        });
        const recordPreviewSnapshot = () => {
            previewHistory.push(capturePreviewSnapshot());
            if (previewHistory.length > PREVIEW_HISTORY_LIMIT) previewHistory.shift();
            updateStepBackButton();
        };
        const restorePreviewSnapshot = (snapshot) => {
            if (!snapshot) return;
            previewCharacter = snapshot.previewCharacter || previewCharacter;
            subIndex = Number.isInteger(snapshot.subIndex) ? snapshot.subIndex : subIndex;
            window._previewWeapon = snapshot.previewWeapon || window._previewWeapon;
            Object.assign(previewEffectState, snapshot.previewEffectState || {});
            restoreActorSnapshot(ninja, snapshot.ninja);
            restoreActorSnapshot(shogunPlayer, snapshot.shogun);
            window.__simAccum = Number.isFinite(snapshot.simAccum) ? snapshot.simAccum : 0;
            isPaused = true;
            syncGameState();
            updateUI();
            updateStepBackButton();
        };

        // --- デバッグ: モーション速度 / ズーム(引き) / コマ送り ---
        document.getElementById('motionSpeed').addEventListener('input', (e) => {
            document.getElementById('motionSpeedVal').textContent = (parseFloat(e.target.value) || 1).toFixed(2) + 'x';
        });
        document.getElementById('viewZoom').addEventListener('input', (e) => {
            document.getElementById('viewZoomVal').textContent = (parseFloat(e.target.value) || 1).toFixed(2) + 'x';
        });
        document.getElementById('btnStepBackFrame').addEventListener('click', () => {
            const snapshot = previewHistory.pop();
            if (!snapshot) {
                updateStepBackButton();
                return;
            }
            restorePreviewSnapshot(snapshot);
        });
        document.getElementById('btnStepFrame').addEventListener('click', () => {
            window.__stepFrameRequested = true;
        });
        document.getElementById('btnHideArmor').addEventListener('click', (e) => {
            // native 描画は shogunPlayer 自身の _drawShogun*（hideShogunArmor を参照）。
            const next = !shogunPlayer.hideShogunArmor;
            shogunPlayer.hideShogunArmor = next;
            if (shogun) shogun.hideShogunArmor = next;
            e.currentTarget.classList.toggle('active', next);
        });

        // 初期状態を同期（忍具Lv・奥義Lvを個別に）
        applyWeaponLv(parseInt(document.getElementById('selWeaponLv').value));
        applySkillLv(parseInt(document.getElementById('selSkillLv').value));

        // プレビューの画面端ループは本編にはないワープなので、ワールド座標で残る剣筋も同量だけ平行移動する。
        const shiftPreviewTrailPointX = (point, dx) => {
            if (!point || !Number.isFinite(dx) || dx === 0) return;
            [
                'x', 'centerX', 'originX', 'handX', 'tipX',
                'playerX', 'trailTransformPlayerX',
                'baseCenterX', 'projectedCenterX', 'frozenTrailCenterX'
            ].forEach((key) => {
                if (Number.isFinite(point[key])) point[key] += dx;
            });
            if (!point.trailIsRelative) {
                [
                    'trailCurveStartX', 'trailCurveControlX', 'trailCurveEndX',
                    'trailArcCenterX'
                ].forEach((key) => {
                    if (Number.isFinite(point[key])) point[key] += dx;
                });
            }
            if (point.fixedStartWorldPoint && Number.isFinite(point.fixedStartWorldPoint.x)) {
                point.fixedStartWorldPoint.x += dx;
            }
        };
        const shiftPreviewTrailArrayX = (points, dx) => {
            if (!Array.isArray(points)) return;
            points.forEach((point) => shiftPreviewTrailPointX(point, dx));
        };
        const shiftPreviewFrozenCurveX = (curve, dx) => {
            if (!curve || !Number.isFinite(dx) || dx === 0) return;
            shiftPreviewTrailPointX(curve, dx);
            shiftPreviewTrailArrayX(curve.frozenPoints, dx);
            shiftPreviewTrailArrayX(curve.frozenCurvePoints, dx);
            if (curve.boostAnchor) shiftPreviewTrailPointX(curve.boostAnchor, dx);
        };
        const shiftPreviewBoostAnchorsX = (anchors, dx) => {
            if (!anchors || typeof anchors !== 'object') return;
            if (Array.isArray(anchors)) {
                anchors.forEach((entry) => shiftPreviewBoostAnchorsX(entry, dx));
                return;
            }
            Object.values(anchors).forEach((entry) => shiftPreviewBoostAnchorsX(entry, dx));
            shiftPreviewTrailPointX(anchors, dx);
        };
        const shiftPreviewAccessoryNodesX = (nodes, dx) => {
            if (!Array.isArray(nodes)) return;
            nodes.forEach((node) => {
                if (node && Number.isFinite(node.x)) node.x += dx;
            });
        };
        const shiftPreviewActorWorldX = (actor, dx) => {
            if (!actor || !Number.isFinite(dx) || dx === 0) return;
            shiftPreviewTrailArrayX(actor.comboSlashTrailPoints, dx);
            shiftPreviewTrailArrayX(actor.dualBladeBackTrailPoints, dx);
            shiftPreviewTrailArrayX(actor.dualBladeFrontTrailPoints, dx);
            if (Array.isArray(actor.comboSlashTrailFrozenCurves)) {
                actor.comboSlashTrailFrozenCurves.forEach((curve) => shiftPreviewFrozenCurveX(curve, dx));
            }
            shiftPreviewBoostAnchorsX(actor.comboSlashTrailBoostAnchors, dx);
            shiftPreviewBoostAnchorsX(actor.dualBladeBoostAnchors, dx);
            shiftPreviewTrailPointX(actor.comboSlashTrailSampleState, dx);
            if (actor.dualBladeTrailAnchors) {
                shiftPreviewTrailPointX(actor.dualBladeTrailAnchors, dx);
                shiftPreviewTrailPointX(actor.dualBladeTrailAnchors.back, dx);
                shiftPreviewTrailPointX(actor.dualBladeTrailAnchors.front, dx);
            }

            [
                'specialCloneSlashTrailPoints',
                'specialCloneDualBackTrailPoints',
                'specialCloneDualFrontTrailPoints'
            ].forEach((key) => {
                if (Array.isArray(actor[key])) actor[key].forEach((points) => shiftPreviewTrailArrayX(points, dx));
            });
            if (Array.isArray(actor.specialCloneSlashTrailFrozenCurves)) {
                actor.specialCloneSlashTrailFrozenCurves.forEach((curves) => {
                    if (Array.isArray(curves)) curves.forEach((curve) => shiftPreviewFrozenCurveX(curve, dx));
                });
            }
            shiftPreviewBoostAnchorsX(actor.specialCloneSlashTrailBoostAnchors, dx);
            shiftPreviewBoostAnchorsX(actor.specialCloneDualBoostAnchors, dx);
            if (Array.isArray(actor.specialCloneDualTrailAnchors)) {
                actor.specialCloneDualTrailAnchors.forEach((anchors) => {
                    if (!anchors) return;
                    shiftPreviewTrailPointX(anchors, dx);
                    shiftPreviewTrailPointX(anchors.back, dx);
                    shiftPreviewTrailPointX(anchors.front, dx);
                });
            }

            if (actor.currentAttack) shiftPreviewTrailPointX(actor.currentAttack, dx);
            if (actor.comboStep5RecoveryAttack) shiftPreviewTrailPointX(actor.comboStep5RecoveryAttack, dx);
            if (Array.isArray(actor.specialCloneMirroredTrailProfiles)) {
                actor.specialCloneMirroredTrailProfiles.forEach((profile) => shiftPreviewTrailPointX(profile, dx));
            }
            if (Array.isArray(actor.specialCloneCurrentAttacks)) {
                actor.specialCloneCurrentAttacks.forEach((profile) => shiftPreviewTrailPointX(profile, dx));
            }

            if (Array.isArray(actor.specialClonePositions)) {
                actor.specialClonePositions.forEach((pos) => {
                    if (!pos) return;
                    if (Number.isFinite(pos.x)) pos.x += dx;
                    if (Number.isFinite(pos.prevX)) pos.prevX += dx;
                });
            }
            [
                'scarfNodes', 'hairNodes',
                'previewScarfNodes', 'previewHairNodes'
            ].forEach((key) => shiftPreviewAccessoryNodesX(actor[key], dx));
            [
                'specialCloneScarfNodes',
                'specialCloneHairNodes'
            ].forEach((key) => {
                if (Array.isArray(actor[key])) actor[key].forEach((nodes) => shiftPreviewAccessoryNodesX(nodes, dx));
            });
        };

        // windowへの直接リスナーを廃止し、inputマネージャーに統一（バグ防止）
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'escape') isPaused = !isPaused;
        });

        // --- ループ ---
        function loop(time) {
            // モーション速度（スロー再生）/ ズーム（引き）をスライダーから取得
            const _spdEl = document.getElementById('motionSpeed');
            const _spd = _spdEl ? (parseFloat(_spdEl.value) || 1) : 1;
            const _zEl = document.getElementById('viewZoom');
            const _zoom = _zEl ? (parseFloat(_zEl.value) || 1) : 1;

            // ズーム引き時に実際へ見えているワールド範囲を弾(手裏剣等)の消滅判定へ公開する。
            // weapon.js のプレビュー用画面外判定がこの範囲+マージンで消すため、
            // 引きでも弾が画面端まで飛ぶ。
            window.__previewViewWorldBounds = {
                left: logicalW / 2 - (logicalW / 2) / _zoom,
                right: logicalW / 2 + (logicalW / 2) / _zoom
            };

            // 固定タイムステップ + 実時間蓄積でスロー再生する。
            // dtを直接縮めるとフレーム結合した物理(宙返りの上昇等)が歪むため、
            // 物理は常に1/60秒刻みで進め、進める「頻度」だけを速度で変える。
            const FIXED_DT = 1 / 60;
            const realElapsed = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;
            if (window.__simAccum === undefined) window.__simAccum = 0;
            window.__simAccum += realElapsed * _spd;
            let _runUpdate = false;
            if (!isPaused && window.__simAccum >= FIXED_DT) {
                window.__simAccum -= FIXED_DT;
                if (window.__simAccum > FIXED_DT * 3) window.__simAccum = FIXED_DT * 3; // バックログ制限
                _runUpdate = true;
            }
            // コマ送り: 一時停止中に1ステップだけ進める
            if (isPaused && window.__stepFrameRequested) {
                window.__stepFrameRequested = false;
                window.__simAccum = 0;
                _runUpdate = true;
            }
            const dt = FIXED_DT;
            game.deltaTime = dt;
            syncGameState();

            if (typeof lastNinjaSubIndex === 'undefined') window.lastNinjaSubIndex = -1;

            if (_runUpdate) {
                recordPreviewSnapshot();
                applyPreviewEffectState(getActiveActor());

                // 状態・入力の同期
                if (isShogunMode()) {
                    // 将軍はゲームの実プレイアブル将軍。移動・ジャンプ・ダッシュ・しゃがみ・攻撃・
                    // 二刀Zは shogunPlayer.update → combatController.handleInput が処理する。
                    // 奥義(SPECIAL)はゲージ充填のため UI(btnOugi)経由。
                    if (input.isActionJustPressed('SPECIAL')) document.getElementById('btnOugi').click();
                    // サブ武器切替(C): 実ゲームと同じく player.subWeapons/currentSubWeapon を切り替える。
                    if (input.isActionJustPressed('SWITCH_WEAPON')) cycleSubWeapon();
                    // プレビューUIで選択中のサブ武器をプレイヤーに装備（アイドル時のみ）。
                    // ゲームの switchSubWeapon 相当: プレイヤーの currentSubWeapon(実装備)に設定する。
                    const _shogunBusy = shogunPlayer.attackTimer > 0 || shogunPlayer.subWeaponTimer > 0 || shogunPlayer.isAttacking;
                    if (!_shogunBusy && window._previewWeapon) {
                        equipShogunPreviewWeapon(window._previewWeapon);
                    }
                    shogunPlayer.update(dt, [], []);
                } else {
                    // 忍者は previewMode=false なので、移動・ジャンプ・ダッシュ・しゃがみ・攻撃・忍具は
                    // ninja.update → handleInput が実ゲームと同じロジックで処理する（手動移動は廃止）。
                    // 奥義(SPECIAL)だけはプレビューでゲージを充填して発動させたいので UI(btnOugi)経由にする。
                    if (input.isActionJustPressed('SPECIAL')) document.getElementById('btnOugi').click();

                    // 忍者の更新。入力処理・物理・サブ武器更新も内部で完結。
                    ninja.update(dt, [], []);

                    // 忍者の忍具切り替えを監視してUI同期
                    if (ninja.subWeaponIndex !== window.lastNinjaSubIndex) {
                        window.lastNinjaSubIndex = ninja.subWeaponIndex;
                        const currentName = ninja.currentSubWeapon?.name;
                        const targetKey = Object.keys(subWeaponNames).find(k => subWeaponNames[k] === currentName);
                        if (targetKey) {
                            // 内部インデックスのみ同期し、cycleSubWeaponは呼ばない
                            const sIdx = subWeapons.indexOf(targetKey);
                            if (sIdx !== -1) subIndex = sIdx;
                            window._previewWeapon = targetKey;
                            equipShogunPreviewWeapon(targetKey);
                        }
                        updateUI();
                    }
                }

                if (typeof game.updateBombs === 'function') {
                    game.updateBombs([], []);
                }

                // 画面端ループ処理（ズーム引き時は実際に見えている範囲の端で折り返す）
                const _halfViewW = (logicalW / 2) / _zoom;
                const _viewLeft = logicalW / 2 - _halfViewW;
                const _viewRight = logicalW / 2 + _halfViewW;
                if (isShogunMode()) {
                    let _wrapped = null;
                    if (shogunPlayer.x < _viewLeft - shogunPlayer.width - 20) _wrapped = _viewRight + 10;
                    else if (shogunPlayer.x > _viewRight + 20) _wrapped = _viewLeft - shogunPlayer.width - 10;
                    if (_wrapped !== null) {
                        const _wrapDx = _wrapped - shogunPlayer.x;
                        shogunPlayer.x = _wrapped;
                        if (shogun) shogun.x = _wrapped;
                        shiftPreviewActorWorldX(shogunPlayer, _wrapDx);
                    }
                } else {
                    let _wrapped = null;
                    if (ninja.x < _viewLeft - ninja.width - 20) _wrapped = _viewRight + 10;
                    else if (ninja.x > _viewRight + 20) _wrapped = _viewLeft - ninja.width - 10;
                    if (_wrapped !== null) {
                        const _wrapDx = _wrapped - ninja.x;
                        ninja.x = _wrapped;
                        shiftPreviewActorWorldX(ninja, _wrapDx);
                    }
                }
                
                // 入力状態の更新（実際のシミュレーションフレームの最後で実行することで、JustPressedの伝達を物理ステップと1:1で同期する）
                input.update();
            }

            // 背景はプレビュー用、キャラ/忍具はゲーム側の共通描画を使う。
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 0, logicalW, logicalH);

            syncGameState();
            ctx.save();
            if (_zoom !== 1) {
                const _pivotX = logicalW / 2, _pivotY = groundY - 50;
                ctx.translate(_pivotX, _pivotY);
                ctx.scale(_zoom, _zoom);
                ctx.translate(-_pivotX, -_pivotY);
            }

            ctx.fillStyle = '#555';
            ctx.fillRect(-logicalW * 2, groundY + 32, logicalW * 5, logicalH * 4);
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(logicalW / 2, -logicalH);
            ctx.lineTo(logicalW / 2, logicalH * 2);
            ctx.stroke();

            game.renderPlayerCombatLayer(ctx);
            ctx.restore();
            
            // UIの同期
            updateUI();
            
            requestAnimationFrame(loop);
        }
        switchChar('ninja');
        updateStepBackButton();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
