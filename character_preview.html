<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>天下統一 - キャラクタプレビュー (最新)</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #1a1a1a;
            --accent: #dcb854; /* 将軍ゴールド */
            --accent-glow: rgba(220, 184, 84, 0.4);
            --text: #e0e0e0;
            --text-muted: #888;
            --border: #333;
            --btn: #2a2a2a;
            --btn-hover: #3a3a3a;
            --btn-active: #735c21;
        }

        body.mode-ninja {
            --accent: #00bfff; /* 忍者の鉢巻色 (DeepSkyBlue) */
            --accent-glow: rgba(0, 191, 255, 0.4);
            --btn-active: #0080af;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .preview-app {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .top-panel {
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-row {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .canvas-container {
            position: relative;
            background: linear-gradient(to bottom, #333, #111);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 100%;
            margin: 0 auto;
        }

        canvas { 
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 800 / 500;
            image-rendering: pixelated;
            outline: none;
        }

        .weapon-info {
            background: #111;
            border: 1px solid var(--border);
            padding: 0 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            color: var(--accent);
            min-width: 100px;
            height: 35px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        button, select {
            height: 35px;
            box-sizing: border-box;
            margin: 0;
        }
        .pill-toggle {
            height: 37px;
            box-sizing: border-box;
            margin: 0;
        }

        button { 
            background: var(--btn);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.1s ease;
            outline: none;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover, .weapon-info:hover, select:hover, .pill-toggle button:hover {
            filter: brightness(1.2);
            border-color: #777;
        }

        button:active, .weapon-info:active, .pill-toggle button:active {
            transform: scale(0.97);
            filter: brightness(0.9);
        }

        button.active {
            background: var(--btn-active);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .pill-toggle {
            position: relative;
            display: flex;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 140px;
            overflow: hidden;
        }

        .pill-toggle .pill-bg {
            position: absolute;
            top: 2px;
            left: 2px;
            width: calc(50% - 4px);
            height: calc(100% - 4px);
            background: var(--accent);
            border-radius: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        body.mode-ninja .pill-toggle .pill-bg {
            transform: translateX(calc(100% + 4px));
        }

        .pill-toggle button {
            position: relative;
            flex: 1;
            border: none;
            background: transparent !important;
            color: #888;
            z-index: 1;
            box-shadow: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: normal;
            padding: 0;
        }

        .pill-toggle button.active {
            color: #000 !important;
        }

        select {
            background: #222;
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%20%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23888%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            padding-right: 30px;
        }

        summary {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
        }

        .tuning-grid {
            background: #111;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
        }

        .param-col h4 {
            margin: 0 0 10px 0;
            color: var(--accent);
            font-size: 11px;
            text-transform: uppercase;
            border-bottom: 1px solid #222;
            padding-bottom: 4px;
        }

        .param-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 11px;
        }

        .param-row label { width: 130px; color: #999; }
        .param-row input { flex: 1; accent-color: var(--accent); }
        .param-row span { width: 40px; text-align: right; color: var(--accent); font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>
    <div class="preview-app">
        <header class="top-panel">
            <div class="panel-row">
                <div class="pill-toggle">
                    <div class="pill-bg"></div>
                    <button id="btnModeShogun" class="active">将軍</button>
                    <button id="btnModeNinja">忍者</button>
                </div>
                <div class="control-group">
                    <div id="selectedSubWeapon" class="weapon-info" title="クリックで忍具切替">---</div>
                </div>
                <div class="control-group">
                    <select id="selSkillLv">
                        <option value="0">初級</option>
                        <option value="1">中級</option>
                        <option value="2">上級</option>
                        <option value="3" selected>特級</option>
                    </select>
                </div>
                <button id="btnOugi">奥義</button>
                <button id="btnOonagi">大薙</button>
                <button id="btnKakuremi">隠れ身</button>
                <button id="btnRestart" style="background:#442222;">リセット</button>
            </div>
        </header>

        <div class="canvas-container">
            <canvas id="previewCanvas" width="800" height="500"></canvas>
        </div>

        <details id="tuningSection" open>
            <summary>将軍の角調整</summary>
            <div class="tuning-grid">
                <div class="param-col" id="tuningColFar">
                    <h4>奥の角 (Far Horn)</h4>
                </div>
                <div class="param-col" id="tuningColNear">
                    <h4>手前の角 (Near Horn)</h4>
                </div>
            </div>
        </details>
    </div>

    <script type="module">
        import { Shogun } from './js/boss.js';
        import { Player } from './js/player.js';
        import { createSubWeapon } from './js/weapon.js';
        import { input } from './js/input.js';

        // --- モック & 初期化 ---
        const logicalW = 800;
        const logicalH = 500;
        const groundY = 400;

        // playerモック（将軍のupdate引数用）
        const previewPlayerMock = { 
            x: 100, y: groundY - 60, width: 40, height: 60,
            get centerX() { return this.x + 20; },
            get centerY() { return this.y + 30; },
            takeDamage: () => {}
        };

        window.game = { 
            scrollX: 0, 
            groundY: groundY, 
            difficulty: { id: 'normal' },
            audio: { play: () => {}, tryPlay: () => {}, stop: () => {}, setVolume: () => {} },
            player: previewPlayerMock,
            bombs: [],
            projectiles: []
        };

        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = logicalW * dpr;
        canvas.height = logicalH * dpr;
        ctx.scale(dpr, dpr);
        input.setCanvas(canvas);

        const shogun = new Shogun(0, 0, 'boss', groundY);
        shogun.init();
        shogun.x = logicalW / 2 - shogun.width / 2;
        shogun.y = groundY - shogun.height;
        shogun.hp = 99999;
        shogun.isEnemy = false;
        shogun.facingRight = true;
        shogun.updateAI = () => {}; // 自律移動を無効化
        shogun.actor.characterType = 'shogun';
        shogun.getSubWeaponEnhanceTier = () => parseInt(document.getElementById('selSkillLv').value);
        shogun._keepSubWeaponKey = true; // アイドルポーズ維持用

        const ninja = new Player(logicalW / 2 - 24, groundY - 72, groundY);
        ninja.speed = 5.2; 
        ninja.previewMode = false;
        ninja.facingRight = true;
        ninja.progression = { normalCombo: 3, subWeapon: 3, specialClone: 3 };

        const subWeaponNames = {
            shuriken: '手裏剣', bomb: '火薬玉', spear: '大槍', dual: '二刀流', kusarigama: '鎖鎌', odachi: '大太刀'
        };
        const subWeapons = ['shuriken', 'bomb', 'spear', 'dual', 'kusarigama', 'odachi'];
        ninja.subWeapons = subWeapons.map(key => createSubWeapon(subWeaponNames[key])).filter(Boolean);
        ninja.currentSubWeapon = ninja.subWeapons[0];
        ninja.subWeaponIndex = 0;

        // --- 状態変数 ---
        let previewCharacter = 'shogun';
        let isWalking = false;
        let isDashing = false;
        let walkDirection = 0;
        let previewComboStep = 0;
        let previewComboResetTimer = 0;
        let lastTime = performance.now();
        let subIndex = 0;
        let isPaused = false;
        window.lastNinjaSubIndex = -1;
        window._previewWeapon = subWeapons[0];

        const isShogunMode = () => previewCharacter === 'shogun';
        const getActiveActor = () => isShogunMode() ? shogun : ninja;

        const updateUI = () => {
            document.getElementById('btnModeShogun').classList.toggle('active', isShogunMode());
            document.getElementById('btnModeNinja').classList.toggle('active', !isShogunMode());
            document.body.classList.toggle('mode-ninja', !isShogunMode());
            document.getElementById('tuningSection').style.display = isShogunMode() ? 'block' : 'none';
            
            const ougiActive = isShogunMode() ? shogun._ougiActive : (ninja.specialActive || ninja.specialCasting);
            document.getElementById('btnOugi').classList.toggle('active', !!ougiActive);
            
            const key = isShogunMode() ? window._previewWeapon : subWeapons[subIndex];
            const weaponName = isShogunMode() 
                ? (shogun._subWeaponInstances[key]?.name || 'なし') 
                : (ninja.currentSubWeapon?.name || 'なし');
            document.getElementById('selectedSubWeapon').textContent = weaponName;
        };

        const switchChar = (mode) => {
            if (previewCharacter === mode) return;
            const prevMode = previewCharacter;
            previewCharacter = mode;
            
            // 将軍と忍者の忍具インデックスを同期させる
            if (mode === 'ninja' && prevMode === 'shogun') {
                const targetKey = subWeapons[subIndex];
                const nIdx = ninja.subWeapons.findIndex(w => {
                    const key = Object.keys(subWeaponNames).find(k => subWeaponNames[k] === w.name);
                    return key === targetKey;
                });
                if (nIdx !== -1) {
                    ninja.subWeaponIndex = nIdx;
                    ninja.currentSubWeapon = ninja.subWeapons[nIdx];
                }
            } else if (mode === 'shogun' && prevMode === 'ninja') {
                const currentName = ninja.currentSubWeapon?.name;
                const targetKey = Object.keys(subWeaponNames).find(k => subWeaponNames[k] === currentName);
                if (targetKey) {
                    subIndex = subWeapons.indexOf(targetKey);
                    if (subIndex === -1) subIndex = 0;
                    window._previewWeapon = subWeapons[subIndex];
                    shogun._subWeaponKey = window._previewWeapon;
                }
            }

            window.game.player = isShogunMode() ? previewPlayerMock : ninja;
            const actor = getActiveActor();
            const actorW = mode === 'shogun' ? 40 : 48; // 正確な素体サイズで計算
            actor.x = (logicalW - actorW) / 2;
            actor.y = groundY - (mode === 'shogun' ? 60 : 72);
            actor.vx = 0; actor.vy = 0;
            updateUI();
        };

        // --- 角パラメータ UI ---
        window.hornParams = {
            farBaseX: -0.03, farBaseY: 0.18, farAngle: 7.00, farTipX: 0.20, farFront: 0.40, farBack: -0.14, farLength: 2.60, farRoot: 2.00,
            nearBaseX: -0.24, nearBaseY: 0.69, nearAngle: -7.00, nearTipX: 0.22, nearFront: -0.10, nearBack: 0.28, nearLength: 2.60, nearRoot: 2.00
        };
        const buildParams = (prefix, containerId) => {
            const container = document.getElementById(containerId);
            const keys = ['BaseX', 'BaseY', 'Angle', 'TipX', 'Front', 'Back', 'Length', 'Root'];
            keys.forEach(k => {
                const id = prefix + k;
                const row = document.createElement('div');
                row.className = 'param-row';
                const isAngle = k === 'Angle';
                const min = isAngle ? -180 : -1;
                const max = isAngle ? 180 : 5;
                row.innerHTML = `<label>${k}</label><input type="range" id="${id}" min="${min}" max="${max}" step="0.01" value="${window.hornParams[id]}"><span id="val_${id}">${window.hornParams[id]}</span>`;
                container.appendChild(row);
                const input = row.querySelector('input');
                const span = row.querySelector('span');
                input.addEventListener('input', (e) => {
                    const v = parseFloat(e.target.value);
                    window.hornParams[id] = v;
                    span.textContent = v.toFixed(2);
                });
            });
        };
        buildParams('far', 'tuningColFar');
        buildParams('near', 'tuningColNear');

        // --- 操作ロジック ---


        const triggerAttack = () => {
            if (!isShogunMode()) return; // 忍者はhandleInputに任せる
            if (shogun._subTimer > 0) return;
            
            const key = window._previewWeapon;
            if (key === 'dual') {
                // 二刀流Zコンボを発動
                shogun._dualZPendingSteps = [1, 2, 3, 4, 5];
                shogun._fireDualZNextStep();
                return;
            }
            // 将軍通常コンボ (discreteトリガー復旧)
            if (shogun._attackTimer > 0) {
                const currentStep = shogun._currentComboStep || 0;
                const t = parseInt(document.getElementById('selSkillLv').value);
                const maxCombo = (t <= 1) ? 3 : (t === 2 ? 4 : 5);
                if (currentStep >= maxCombo) return;
                shogun._comboPendingSteps = [currentStep + 1];
                previewComboStep = currentStep + 1;
                previewComboResetTimer = 500;
            } else {
                const nextStep = (previewComboResetTimer > 0) ? ((previewComboStep % 5) + 1) : 1;
                // コンボ継続時も現在のLvによる上限をチェック
                const t = parseInt(document.getElementById('selSkillLv').value);
                const maxCombo = (t <= 1) ? 3 : (t === 2 ? 4 : 5);
                if (previewComboResetTimer > 0 && nextStep > maxCombo) {
                    // 上限を超えたら1段目に戻る
                    previewComboStep = 1;
                } else {
                    previewComboStep = nextStep;
                }
                previewComboResetTimer = 500;
                shogun._comboPendingSteps = [previewComboStep];
                shogun._startNextComboStep();
            }
        };

        const triggerSubAction = () => {
            if (isShogunMode()) {
                const type = window._previewWeapon;
                shogun._subWeaponKey = type;
                shogun._fireSubWeapon(type);
                
                // 将軍のモーション再生に必要なタイマーとステートを明示的にセット
                const durationMap = {
                    shuriken: shogun._getSubActionDurationMs('throw', 'shuriken'),
                    bomb:     shogun._getSubActionDurationMs('throw', 'bomb'),
                    spear:    shogun._getSubActionDurationMs('大槍', 'spear'),
                    kusarigama: shogun._getSubActionDurationMs('鎖鎌', 'kusarigama'),
                    odachi:   shogun._getSubActionDurationMs('大太刀', 'odachi'),
                    dual:     shogun._getSubActionDurationMs('二刀_合体', 'dual')
                };
                const actionMap = {
                    shuriken: 'throw', bomb: 'throw',
                    spear: '大槍', kusarigama: '鎖鎌',
                    odachi: '大太刀', dual: '二刀_合体'
                };
                
                if (type === 'dual') {
                    shogun._subAction = '二刀_合体';
                    shogun._subTimer = durationMap.dual;
                } else if (type === 'shuriken' || type === 'bomb') {
                    shogun._subAction = 'throw';
                    shogun._subTimer = 100; // 忍者の実効速度(97ms)に合わせる
                    shogun._shurikenVisualTimer = 100;
                } else {
                    shogun._subAction = actionMap[type] || null;
                    shogun._subTimer = durationMap[type] || 300;
                }
                shogun.attackTimer = shogun._subTimer;
                shogun.isAttacking = false; // サブ武器発動時はisAttacking(通常コンボ)を優先させない
            }
            // 忍者はninja.update() -> handleInput() がキー入力を検知して自動で動作する
        };

        const cycleSubWeapon = () => {
            if (isShogunMode()) {
                subIndex = (subIndex + 1) % subWeapons.length;
                window._previewWeapon = subWeapons[subIndex];
                shogun._subWeaponKey = window._previewWeapon;
                shogun.currentSubWeapon = shogun._subWeaponInstances[window._previewWeapon];
                if (shogun.actor) {
                    shogun.actor.currentSubWeapon = shogun.currentSubWeapon;
                }
            } else {
                ninja.switchSubWeapon();
                window._previewWeapon = ninja.currentSubWeapon ? subWeapons[ninja.subWeaponIndex] : null;
            }
            updateUI();
        };

        // --- イベントリスナー ---
        document.getElementById('btnModeShogun').addEventListener('click', () => switchChar('shogun'));
        document.getElementById('btnModeNinja').addEventListener('click', () => switchChar('ninja'));
        document.getElementById('btnOugi').addEventListener('click', () => {
            if (isShogunMode()) {
                shogun._ougiActive = !shogun._ougiActive;
                shogun.actor.isUsingSpecial = shogun._ougiActive;
            } else {
                if (ninja.specialActive) ninja.clearSpecialState(true);
                else { ninja.specialGauge = 100; ninja.useSpecial(); }
            }
            updateUI();
        });
        document.getElementById('btnRestart').addEventListener('click', () => location.reload());
        document.getElementById('selectedSubWeapon').addEventListener('click', cycleSubWeapon);

        // --- 強化レベル同期 ---
        const updateAllTiers = (tier) => {
            const t = parseInt(tier);
            ninja.progression.subWeapon = t;
            ninja.progression.specialClone = t;
            ninja.progression.normalCombo = t;
            ninja.subWeapons.forEach(w => { if(w.applyEnhanceTier) w.applyEnhanceTier(t); });
            if (typeof ninja.rebuildSpecialCloneSlots === 'function') ninja.rebuildSpecialCloneSlots();
            if (typeof ninja.refreshSubWeaponScaling === 'function') ninja.refreshSubWeaponScaling();
            
            if (shogun) {
                if (shogun.progression) {
                    shogun.progression.subWeapon = t;
                    shogun.progression.normalCombo = t;
                }
                if (shogun.actor && shogun.actor.progression) {
                    shogun.actor.progression.subWeapon = t;
                    shogun.actor.progression.normalCombo = t;
                    shogun.actor.progression.specialClone = t;
                }
                Object.values(shogun._subWeaponInstances).forEach(inst => {
                    if (inst && typeof inst.applyEnhanceTier === 'function') inst.applyEnhanceTier(t);
                });
            }
        };

        document.getElementById('selSkillLv').addEventListener('change', (e) => {
            updateAllTiers(e.target.value);
        });
        
        // 初期状態を同期
        updateAllTiers(document.getElementById('selSkillLv').value);


        document.getElementById('btnKakuremi').addEventListener('click', () => {
            if (previewCharacter === 'ninja') {
                ninja._stealthMode = !ninja._stealthMode;
                ninja.isGhostVeilActive = () => !!ninja._stealthMode;
            } else {
                shogun._stealthMode = !shogun._stealthMode;
                shogun.isGhostVeilActive = () => !!shogun._stealthMode;
                shogun.ghostVeilAlpha = shogun._stealthMode ? 0.0 : 1.0;
            }
        });

        document.getElementById('btnOonagi').addEventListener('click', () => {
            const actor = getActiveActor();
            if (actor.applyTemporaryNinjutsuChoice) {
                actor.applyTemporaryNinjutsuChoice('temp_x_attack');
            }
        });

        document.getElementById('btnKakuremi').addEventListener('click', () => {
            const actor = getActiveActor();
            if (actor.applyTemporaryNinjutsuChoice) {
                actor.applyTemporaryNinjutsuChoice('temp_ghost_veil');
            }
        });

        // windowへの直接リスナーを廃止し、inputマネージャーに統一（バグ防止）
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'escape') isPaused = !isPaused;
        });

        // --- ループ ---
        function loop(time) {
            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;
            const deltaMs = dt * 1000;
            
            if (typeof lastNinjaSubIndex === 'undefined') window.lastNinjaSubIndex = -1;

            if (!isPaused) {
                const actor = getActiveActor();
                if (previewComboResetTimer > 0) previewComboResetTimer -= deltaMs;

                // 状態更新
                // 状態・入力の同期
                isDashing = input.isAction('DASH');
                const moveDir = input.isAction('LEFT') ? -1 : (input.isAction('RIGHT') ? 1 : 0);
                walkDirection = moveDir;
                isWalking = moveDir !== 0;

                if (isShogunMode()) {
                    // ボタン入力を input から取得
                    if (input.isActionJustPressed('ATTACK') || input.isActionJustPressed('JUMP')) triggerAttack();
                    if (input.isActionJustPressed('SUB_WEAPON')) triggerSubAction();
                    if (input.isActionJustPressed('SWITCH_WEAPON')) cycleSubWeapon();
                    if (input.isActionJustPressed('SPECIAL')) document.getElementById('btnOugi').click();

                    // 将軍は手動物理
                    const shogunDash = isDashing || (typeof input.isKeyboardDashHeld === 'function' && input.isKeyboardDashHeld(moveDir));
                    if (isWalking && walkDirection !== 0) {
                        const speed = shogunDash ? 8 : 4;
                        actor.vx = walkDirection * speed;
                        actor.facingRight = walkDirection > 0;
                    } else {
                        actor.vx *= 0.8;
                    }
                    shogun.update(dt, null, [], []); 
                    // shogun.update 内部で this.x += this.vx されるので、ここでは追加しない
                    Object.values(shogun._subWeaponInstances).forEach(inst => {
                        if (inst && inst.projectiles && typeof inst.update === 'function') inst.update(dt, []);
                    });
                } else {
                    // 忍者は ninja.update -> input に任せる
                    ninja.update(dt, [], []); 

                    // 忍者の忍具切り替えを監視してUI同期
                    if (ninja.subWeaponIndex !== window.lastNinjaSubIndex) {
                        window.lastNinjaSubIndex = ninja.subWeaponIndex;
                        const currentName = ninja.currentSubWeapon?.name;
                        const targetKey = Object.keys(subWeaponNames).find(k => subWeaponNames[k] === currentName);
                        if (targetKey) {
                            // 内部インデックスのみ同期し、cycleSubWeaponは呼ばない
                            const sIdx = subWeapons.indexOf(targetKey);
                            if (sIdx !== -1) subIndex = sIdx;
                            window._previewWeapon = targetKey;
                            shogun._subWeaponKey = targetKey;
                        }
                        updateUI();
                    }
                    if (ninja.currentSubWeapon && typeof ninja.currentSubWeapon.update === 'function') {
                        ninja.currentSubWeapon.update(dt, []);
                    }
                }

                // グローバルオブジェクト更新
                if (window.game.bombs) {
                    window.game.bombs.forEach(b => { if (b.update) b.update(dt, groundY, []); });
                    window.game.bombs = window.game.bombs.filter(b => !b.isDestroyed);
                }
                window.game.projectiles.forEach(p => { if (p.update) p.update(dt, groundY, []); });
                window.game.projectiles = window.game.projectiles.filter(p => !p.isDead && !p.isDestroyed);

                if (actor.x < -100) actor.x = logicalW + 100;
                if (actor.x > logicalW + 100) actor.x = -100;
            }

            // 描画 (一時停止中も描画は継続)
            ctx.fillStyle = '#333'; ctx.fillRect(0, 0, logicalW, logicalH);
            ctx.fillStyle = '#555'; ctx.fillRect(0, groundY, logicalW, logicalH - groundY);
            ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(logicalW / 2, 0); ctx.lineTo(logicalW / 2, logicalH); ctx.stroke();
            
            if (window.game.bombs) window.game.bombs.forEach(b => { if (b.render) b.render(ctx); });
            window.game.projectiles.forEach(p => { if (p.render) p.render(ctx); });
            
            if (isShogunMode()) {
                shogun.renderBody(ctx); // 将軍内部で剣筋・手裏剣・二刀流・大太刀も描画される
                if (shogun._ougiActive && shogun.actor) shogun.actor.renderSpecial(ctx, {});
            } else {
                if (ninja.renderComboSlashTrail) ninja.renderComboSlashTrail(ctx);
                if (ninja.renderDualBladeSlashTrails) ninja.renderDualBladeSlashTrails(ctx);
                ninja.render(ctx);
                if (ninja.currentSubWeapon && !ninja.subWeaponRenderedInModel && ninja.currentSubWeapon.render) {
                    ninja.currentSubWeapon.render(ctx, ninja);
                }
            }
            
            // UIの同期
            updateUI();
            
            // 入力状態の更新（フレームの最後で行うことで、現在のフレーム内でJustPressedが正しく拾えるようにする）
            input.update();
            
            requestAnimationFrame(loop);
        }
        switchChar('shogun');
        requestAnimationFrame(loop);
    </script>
</body>
</html>
