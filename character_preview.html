<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>天下統一 - キャラクタープレビュー</title>
    <link rel="icon" type="image/png" href="./icon/icon.png">
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #1a1a1a;
            --accent: #dcb854; /* 将軍ゴールド */
            --accent-glow: rgba(220, 184, 84, 0.4);
            --text: #e0e0e0;
            --text-muted: #888;
            --border: #333;
            --btn: #2a2a2a;
            --btn-hover: #3a3a3a;
            --btn-active: #735c21;
        }

        :focus {
            outline: none !important;
            box-shadow: none !important;
        }

        body.mode-ninja {
            --accent: #00bfff; /* 忍者の鉢巻色 (DeepSkyBlue) */
            --accent-glow: rgba(0, 191, 255, 0.4);
            --btn-active: #0080af;
        }

        body {
            background-color: var(--bg); 
            color: var(--text); 
            text-align: center; 
            font-family: 'Outfit', 'Inter', 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
            overflow-x: hidden;
        }
        .btn-action.active {
            background: #bbb !important;
            color: #000 !important;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2) !important;
            border-color: #eee !important;
        }

        .preview-app {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .top-panel {
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-row {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .canvas-container {
            position: relative;
            background: linear-gradient(to bottom, #333, #111);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 100%;
            margin: 0 auto;
        }

        canvas { 
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1280 / 720;
            image-rendering: pixelated;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        :focus {
            outline: none !important;
        }

        .weapon-info {
            background: #111;
            border: 1px solid var(--border);
            padding: 0 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            color: var(--accent);
            min-width: 100px;
            height: 35px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        button, select {
            height: 35px;
            box-sizing: border-box;
            margin: 0;
        }
        .pill-toggle {
            height: 37px;
            box-sizing: border-box;
            margin: 0;
        }

        button { 
            background: var(--btn);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.1s ease;
            outline: none;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover, .weapon-info:hover, select:hover, .pill-toggle button:hover {
            filter: brightness(1.2);
            border-color: #777;
        }

        button:active, .weapon-info:active, .pill-toggle button:active {
            transform: scale(0.97);
            filter: brightness(0.9);
        }

        button.active {
            background: var(--btn-active);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .pill-toggle {
            position: relative;
            display: flex;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 140px;
            overflow: hidden;
        }

        .pill-toggle .pill-bg {
            position: absolute;
            top: 2px;
            left: 2px;
            width: calc(50% - 4px);
            height: calc(100% - 4px);
            background: var(--accent);
            border-radius: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        body.mode-ninja .pill-toggle .pill-bg {
            transform: translateX(calc(100% + 4px));
        }

        .pill-toggle button {
            position: relative;
            flex: 1;
            border: none;
            background: transparent !important;
            color: #888;
            z-index: 1;
            box-shadow: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: normal;
            padding: 0;
        }

        .pill-toggle button.active {
            color: #000 !important;
        }

        select {
            background: #222;
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%20%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23888%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            padding-right: 30px;
        }

        summary {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
        }

        .tuning-grid {
            background: #111;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
        }

        .param-col h4 {
            margin: 0 0 10px 0;
            color: var(--accent);
            font-size: 11px;
            text-transform: uppercase;
            border-bottom: 1px solid #222;
            padding-bottom: 4px;
        }

        .param-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 11px;
        }

        .param-row label { width: 130px; color: #999; flex-shrink: 0; }
        .param-row input { flex: 1; min-width: 60px; accent-color: var(--accent); }
        .param-row span { width: 40px; text-align: right; color: var(--accent); font-family: monospace; font-weight: bold; flex-shrink: 0; }

        @media (max-width: 700px) {
            .tuning-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="preview-app">
        <header class="top-panel">
            <div class="panel-row">
                <div class="pill-toggle">
                    <div class="pill-bg"></div>
                    <button id="btnModeShogun" class="active">将軍</button>
                    <button id="btnModeNinja">忍者</button>
                </div>
                <div class="control-group">
                    <div id="selectedSubWeapon" class="weapon-info" title="クリックで忍具切替">---</div>
                </div>
                <div class="control-group">
                    <label style="color:#aaa;font-size:11px;margin-right:2px;">忍具Lv</label>
                    <select id="selWeaponLv">
                        <option value="0">初級</option>
                        <option value="1">中級</option>
                        <option value="2">上級</option>
                        <option value="3" selected>特級</option>
                    </select>
                    <label style="color:#aaa;font-size:11px;margin:0 2px 0 6px;">奥義Lv</label>
                    <select id="selSkillLv">
                        <option value="0">初級</option>
                        <option value="1">中級</option>
                        <option value="2">上級</option>
                        <option value="3" selected>特級</option>
                    </select>
                </div>
                <button id="btnOugi" class="btn-action">奥義</button>
                <button id="btnOonagi" class="btn-action">大薙</button>
                <button id="btnKakuremi" class="btn-action">隠れ身</button>
                <button id="btnRestart" style="background:#442222;">リセット</button>
            </div>
            <div class="panel-row" style="gap:18px; align-items:center;">
                <label style="display:flex; align-items:center; gap:6px;">
                    スピード
                    <input type="range" id="motionSpeed" min="0.05" max="1" step="0.05" value="1">
                    <span id="motionSpeedVal" style="min-width:42px;">1.00x</span>
                </label>
                <label style="display:flex; align-items:center; gap:6px;">
                    ズーム
                    <input type="range" id="viewZoom" min="0.3" max="1.5" step="0.05" value="1">
                    <span id="viewZoomVal" style="min-width:42px;">1.00x</span>
                </label>
                <button id="btnStepFrame" class="btn-action" title="一時停止中に1フレーム進める">コマ送り</button>
                <button id="btnHideArmor" class="btn-action" title="将軍の鎧・兜を非表示にして素体の四肢の重ね順を確認">防具非表示</button>
            </div>
        </header>

        <div class="canvas-container">
            <canvas id="previewCanvas" width="800" height="500"></canvas>
        </div>

        <details id="tuningSection" open>
            <summary>将軍の角調整</summary>
            <div class="tuning-grid">
                <div class="param-col" id="tuningColFar">
                    <h4>奥の角 (Far Horn)</h4>
                </div>
                <div class="param-col" id="tuningColNear">
                    <h4>手前の角 (Near Horn)</h4>
                </div>
            </div>
        </details>
    </div>

    <script type="module">
        import { Player } from './js/player.js';
        import { createSubWeapon } from './js/weapon.js';
        import { input } from './js/input.js';

        // 描画系・戦闘ヘルパは頻繁に編集するため、ESモジュールキャッシュ対策として
        // バージョン付きdynamic importで毎回最新を取得する（bare URL の静的importは
        // ブラウザのモジュールマップに固定され更新されないため）。
        const _bustParam = new URLSearchParams(location.search).get('_t') || String(Date.now());
        const { applyRendererMixin } = await import('./js/playerRenderer.js?v=' + _bustParam);
        applyRendererMixin(Player);
        const { applySlashTrailMixin } = await import('./js/playerSlashTrail.js?v=' + _bustParam);
        applySlashTrailMixin(Player);
        // 将軍はゲームの実プレイアブル将軍(Player+applyShogunCombat)として生成する。
        const { applyShogunCombat } = await import('./js/shogunCombatHelper.js?v=' + _bustParam);

        // --- モック & 初期化 ---
        const logicalW = 1280;
        const logicalH = 720;
        const groundY = 480;

        // playerモック（将軍のupdate引数用）
        const previewPlayerMock = { 
            x: 100, y: groundY - 60, width: 40, height: 60,
            get centerX() { return this.x + 20; },
            get centerY() { return this.y + 30; },
            takeDamage: () => {}
        };

        window.game = { 
            scrollX: 0, 
            groundY: groundY, 
            state: 'playing',
            difficulty: { id: 'normal' },
            audio: { play: () => {}, tryPlay: () => {}, stop: () => {}, setVolume: () => {} },
            player: previewPlayerMock,
            bombs: [],
            projectiles: [],
            enemies: [] // 将軍戦闘コントローラの当たり判定が参照（プレビューは敵なし）
        };

        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = logicalW * dpr;
        canvas.height = logicalH * dpr;
        ctx.scale(dpr, dpr);
        input.setCanvas(canvas);

        // ===== 将軍 = ゲームの実プレイアブル将軍（Player + applyShogunCombat）=====
        // ゲームと同一の生成手順。内部に _shogunBossInstance（戦闘・描画エンジン）を持つ。
        // 既存コードの shogun.* 参照（_subTimer / actor / renderBody 等）はこの内部ボスを指すよう
        // shogun = shogunPlayer._shogunBossInstance とし、駆動/描画/操作だけ shogunPlayer 経由にする。
        const shogunPlayer = new Player(logicalW / 2 - 24, groundY - 72, groundY);
        shogunPlayer.characterType = 'shogun';
        shogunPlayer.progression = { normalCombo: 3, subWeapon: 3, specialClone: 3 };
        applyShogunCombat(shogunPlayer);        // ゲーム側と同じ経路で将軍戦闘コントローラを確認
        shogunPlayer.previewMode = false;       // 実ゲームと同じ入力・物理
        shogunPlayer.facingRight = true;
        shogunPlayer.maxJumps = 3;              // 三段跳び
        shogunPlayer._previewFreeMovement = true; // 画面端ループ/ズーム引きのためカメラ境界クランプを無効化
        // 内部ボス（_shogunBossInstance）は初回 update で生成されるため、ここで一度走らせる
        shogunPlayer.update(1 / 60, [], []);
        const shogun = shogunPlayer._shogunBossInstance; // 既存 shogun.* 参照の互換用（内部ボス）

        // ── boss.js キャッシュ対策（将軍素体描画の編集をプレビューへ反映）──
        // 将軍の素体・防具描画(_drawShogun* / renderBody 等)は boss.js にあるが、boss.js は
        // 他モジュールから bare URL で静的importされるため、ブラウザのモジュールマップに固定され
        // ファイル編集が反映されない。最新版 boss.js の Shogun プロトタイプメソッドを内部ボスの
        // クラスへ再適用し、描画系の編集を即プレビューに反映させる（playerRenderer等のmixinと同様）。
        try {
            const _freshBoss = await import('./js/boss.js?v=' + _bustParam);
            const _FreshProto = _freshBoss.Shogun && _freshBoss.Shogun.prototype;
            const _CachedProto = shogun.constructor && shogun.constructor.prototype;
            if (_FreshProto && _CachedProto && _FreshProto !== _CachedProto) {
                for (const _m of Object.getOwnPropertyNames(_FreshProto)) {
                    if (_m === 'constructor') continue;
                    const _d = Object.getOwnPropertyDescriptor(_FreshProto, _m);
                    if (_d) Object.defineProperty(_CachedProto, _m, _d);
                }
            }
        } catch (_e) { console.warn('fresh boss.js re-apply failed', _e); }

        // プレビュー初期位置を画面中央に揃える。spawn は忍者幅(48)基準なので、構築後の実幅で中央寄せする。
        shogunPlayer.x = logicalW / 2 - shogunPlayer.width / 2;

        const ninja = new Player(logicalW / 2 - 24, groundY - 72, groundY);
        // 実ゲームと同じ挙動を再現するため previewMode=false。
        // 移動・ジャンプ・ダッシュ・しゃがみ・攻撃・忍具・奥義はすべて ninja.update→handleInput が
        // ゲームと同じロジックで処理する（プレビュー専用の手動移動/摩擦は廃止）。
        ninja.previewMode = false;
        ninja.facingRight = true;
        ninja.maxJumps = 3;    // プレビューは三段跳びをデフォルトに
        ninja._previewFreeMovement = true; // 画面端ループ/ズーム引きのため通常の左端クランプを無効化
        ninja.progression = { normalCombo: 3, subWeapon: 3, specialClone: 3 };
        ninja.x = logicalW / 2 - ninja.width / 2; // 初期位置を画面中央に揃える

        const subWeaponNames = {
            shuriken: '手裏剣', bomb: '火薬玉', spear: '大槍', dual: '二刀流', kusarigama: '鎖鎌', odachi: '大太刀'
        };
        const subWeapons = ['shuriken', 'bomb', 'spear', 'dual', 'kusarigama', 'odachi'];
        ninja.subWeapons = subWeapons.map(key => createSubWeapon(subWeaponNames[key])).filter(Boolean);
        ninja.currentSubWeapon = ninja.subWeapons[0];
        ninja.subWeaponIndex = 0;
        shogunPlayer.subWeapons = subWeapons.map(key => createSubWeapon(subWeaponNames[key])).filter(Boolean);
        shogunPlayer.currentSubWeapon = shogunPlayer.subWeapons[0] || null;
        shogunPlayer.subWeaponIndex = 0;

        // --- 状態変数 ---
        let previewCharacter = 'shogun';
        let lastTime = performance.now();
        let subIndex = 0;
        let isPaused = false;
        window.lastNinjaSubIndex = -1;
        window._previewWeapon = subWeapons[0];
        const equipShogunPreviewWeapon = (key) => {
            const weaponName = subWeaponNames[key];
            const idx = shogunPlayer.subWeapons.findIndex(w => w && w.name === weaponName);
            if (idx === -1) return false;
            shogunPlayer.subWeaponIndex = idx;
            shogunPlayer.currentSubWeapon = shogunPlayer.subWeapons[idx];
            return true;
        };

        const isShogunMode = () => previewCharacter === 'shogun';
        const getActiveActor = () => isShogunMode() ? shogunPlayer : ninja;
        const updateUI = () => {
            document.getElementById('btnModeShogun').classList.toggle('active', isShogunMode());
            document.getElementById('btnModeNinja').classList.toggle('active', !isShogunMode());
            document.body.classList.toggle('mode-ninja', !isShogunMode());
            document.getElementById('tuningSection').style.display = isShogunMode() ? 'block' : 'none';
            
            const _spForUI = isShogunMode() ? shogunPlayer : ninja;
            const ougiActive = !!(_spForUI && (_spForUI.isUsingSpecial || _spForUI.specialActive || _spForUI.specialCasting));
            document.getElementById('btnOugi').classList.toggle('active', !!ougiActive);
            
            const actor = getActiveActor();
            if (actor && actor.tempNinjutsuTimers) {
                const oonagiActive = (actor.tempNinjutsuTimers.xAttack || 0) > 0;
                document.getElementById('btnOonagi').classList.toggle('active', oonagiActive);
                
                const kakuremiActive = (actor.tempNinjutsuTimers.ghostVeil || 0) > 0;
                document.getElementById('btnKakuremi').classList.toggle('active', kakuremiActive);
            }

            const key = isShogunMode() ? window._previewWeapon : subWeapons[subIndex];
            const weaponName = isShogunMode()
                ? (shogunPlayer.currentSubWeapon?.name || subWeaponNames[key] || 'なし')
                : (ninja.currentSubWeapon?.name || 'なし');
            document.getElementById('selectedSubWeapon').textContent = weaponName;
        };

        const switchChar = (mode) => {
            if (previewCharacter === mode) return;
            const prevMode = previewCharacter;
            previewCharacter = mode;
            
            // 将軍と忍者の忍具インデックスを同期させる
            if (mode === 'ninja' && prevMode === 'shogun') {
                const targetKey = subWeapons[subIndex];
                const nIdx = ninja.subWeapons.findIndex(w => {
                    const key = Object.keys(subWeaponNames).find(k => subWeaponNames[k] === w.name);
                    return key === targetKey;
                });
                if (nIdx !== -1) {
                    ninja.subWeaponIndex = nIdx;
                    ninja.currentSubWeapon = ninja.subWeapons[nIdx];
                }
            } else if (mode === 'shogun' && prevMode === 'ninja') {
                const currentName = ninja.currentSubWeapon?.name;
                const targetKey = Object.keys(subWeaponNames).find(k => subWeaponNames[k] === currentName);
                if (targetKey) {
                    subIndex = subWeapons.indexOf(targetKey);
                    if (subIndex === -1) subIndex = 0;
                    window._previewWeapon = subWeapons[subIndex];
                    equipShogunPreviewWeapon(window._previewWeapon);
                }
            }

            window.game.player = isShogunMode() ? previewPlayerMock : ninja;
            const actor = getActiveActor();
            // 中央寄せは構築時と同じ計算に統一する。
            actor.x = logicalW / 2 - actor.width / 2;
            actor.y = groundY - (mode === 'shogun' ? 60 : 72);
            actor.vx = 0; actor.vy = 0;
            // 将軍は内部ボスのx/vxも同期しないと、ボス→プレイヤーのx同期で位置が上書きされる
            if (mode === 'shogun' && shogun) { shogun.x = actor.x; shogun.vx = 0; }
            updateUI();
        };

        // --- 角パラメータ UI ---
        window.hornParams = {
            farBaseX: -0.03, farBaseY: 0.18, farAngle: 7.00, farTipX: 0.20, farFront: 0.40, farBack: -0.14, farLength: 2.60, farRoot: 2.00,
            nearBaseX: -0.24, nearBaseY: 0.69, nearAngle: -7.00, nearTipX: 0.22, nearFront: -0.10, nearBack: 0.28, nearLength: 2.60, nearRoot: 2.00
        };
        const buildParams = (prefix, containerId) => {
            const container = document.getElementById(containerId);
            const keys = ['BaseX', 'BaseY', 'Angle', 'TipX', 'Front', 'Back', 'Length', 'Root'];
            keys.forEach(k => {
                const id = prefix + k;
                const row = document.createElement('div');
                row.className = 'param-row';
                const isAngle = k === 'Angle';
                const min = isAngle ? -180 : -1;
                const max = isAngle ? 180 : 5;
                row.innerHTML = `<label>${k}</label><input type="range" id="${id}" min="${min}" max="${max}" step="0.01" value="${window.hornParams[id]}"><span id="val_${id}">${window.hornParams[id]}</span>`;
                container.appendChild(row);
                const input = row.querySelector('input');
                const span = row.querySelector('span');
                input.addEventListener('input', (e) => {
                    const v = parseFloat(e.target.value);
                    window.hornParams[id] = v;
                    span.textContent = v.toFixed(2);
                });
            });
        };
        buildParams('far', 'tuningColFar');
        buildParams('near', 'tuningColNear');

        const cycleSubWeapon = () => {
            if (isShogunMode()) {
                // UI選択をサイクル。実ゲームと同じくプレイヤー側 currentSubWeapon へ装備する
                subIndex = (subIndex + 1) % subWeapons.length;
                window._previewWeapon = subWeapons[subIndex];
                equipShogunPreviewWeapon(window._previewWeapon);
            } else {
                ninja.switchSubWeapon();
                window._previewWeapon = ninja.currentSubWeapon ? subWeapons[ninja.subWeaponIndex] : null;
            }
            updateUI();
        };

        // --- イベントリスナー ---
        document.getElementById('btnModeShogun').addEventListener('click', () => switchChar('shogun'));
        document.getElementById('btnModeNinja').addEventListener('click', () => switchChar('ninja'));
        document.getElementById('btnOugi').addEventListener('click', () => {
            const sp = isShogunMode() ? shogunPlayer : ninja;
            if (sp.isUsingSpecial || sp.specialActive || sp.specialCasting) {
                sp.clearSpecialState(true);
            } else {
                sp.specialGauge = sp.maxSpecialGauge || 100;
                sp.useSpecial();
            }
            updateUI();
        });
        document.getElementById('btnOonagi').addEventListener('click', () => {
            const actor = getActiveActor();
            if (!actor || !actor.tempNinjutsuTimers) return;
            
            if ((actor.tempNinjutsuTimers.xAttack || 0) > 0) {
                actor.tempNinjutsuTimers.xAttack = 0;
            } else {
                actor.tempNinjutsuTimers.xAttack = 60000;
            }
            updateUI();
        });
        document.getElementById('btnKakuremi').addEventListener('click', () => {
            const actor = getActiveActor();
            if (!actor || !actor.tempNinjutsuTimers) return;
            
            if ((actor.tempNinjutsuTimers.ghostVeil || 0) > 0) {
                actor.tempNinjutsuTimers.ghostVeil = 0;
            } else {
                actor.tempNinjutsuTimers.ghostVeil = 60000;
            }
            updateUI();
        });
        document.getElementById('btnRestart').addEventListener('click', () => {
            // ESモジュールのキャッシュをバイパスするためURLにタイムスタンプを付与
            const url = new URL(location.href);
            url.searchParams.set('_t', Date.now());
            location.replace(url.toString());
        });
        document.getElementById('selectedSubWeapon').addEventListener('click', cycleSubWeapon);

        // --- 強化レベル同期 ---
        // 忍具Lv(subWeapon) と 奥義Lv(specialClone) は実ゲームでは別々に存在するため、
        // プレビューでも個別に設定できるようにする（normalComboは忍具Lvに追従）。
        const applyWeaponLv = (t) => {  // 忍具Lv: 武器強化段(enhanceTier) + 通常コンボLv
            ninja.progression.subWeapon = t;
            ninja.progression.normalCombo = t;
            ninja.subWeapons.forEach(w => { if(w.applyEnhanceTier) w.applyEnhanceTier(t); });
            if (typeof ninja.refreshSubWeaponScaling === 'function') ninja.refreshSubWeaponScaling();
            if (shogunPlayer && shogunPlayer.progression) {
                shogunPlayer.progression.subWeapon = t;
                shogunPlayer.progression.normalCombo = t;
                if (typeof shogunPlayer.refreshSubWeaponScaling === 'function') shogunPlayer.refreshSubWeaponScaling();
            }
        };
        const applySkillLv = (t) => {  // 奥義Lv: 分身の体数・自律AI
            ninja.progression.specialClone = t;
            if (typeof ninja.rebuildSpecialCloneSlots === 'function') ninja.rebuildSpecialCloneSlots();
            if (shogunPlayer && shogunPlayer.progression) {
                shogunPlayer.progression.specialClone = t;
                if (typeof shogunPlayer.rebuildSpecialCloneSlots === 'function') shogunPlayer.rebuildSpecialCloneSlots();
            }
        };
        // 後方互換: 既存呼び出し用に両方を一括設定するヘルパーも残す
        const updateAllTiers = (tier) => { const t = parseInt(tier); applyWeaponLv(t); applySkillLv(t); };

        document.getElementById('selWeaponLv').addEventListener('change', (e) => {
            applyWeaponLv(parseInt(e.target.value));
        });
        document.getElementById('selSkillLv').addEventListener('change', (e) => {
            applySkillLv(parseInt(e.target.value));
        });

        // --- デバッグ: モーション速度 / ズーム(引き) / コマ送り ---
        document.getElementById('motionSpeed').addEventListener('input', (e) => {
            document.getElementById('motionSpeedVal').textContent = (parseFloat(e.target.value) || 1).toFixed(2) + 'x';
        });
        document.getElementById('viewZoom').addEventListener('input', (e) => {
            document.getElementById('viewZoomVal').textContent = (parseFloat(e.target.value) || 1).toFixed(2) + 'x';
        });
        document.getElementById('btnStepFrame').addEventListener('click', () => {
            window.__stepFrameRequested = true;
        });
        document.getElementById('btnHideArmor').addEventListener('click', (e) => {
            shogun.hideShogunArmor = !shogun.hideShogunArmor;
            e.currentTarget.classList.toggle('active', shogun.hideShogunArmor);
        });

        // 初期状態を同期（忍具Lv・奥義Lvを個別に）
        applyWeaponLv(parseInt(document.getElementById('selWeaponLv').value));
        applySkillLv(parseInt(document.getElementById('selSkillLv').value));

        // [DEBUG-EXPOSE] E統一実装の検証用ハンドル（Phase2完了後に除去）
        window.__dbg = { shogunPlayer, ninja, shogun, equipShogunPreviewWeapon, get active(){ return previewCharacter === 'shogun' ? shogunPlayer : ninja; } };

        // windowへの直接リスナーを廃止し、inputマネージャーに統一（バグ防止）
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'escape') isPaused = !isPaused;
        });

        // --- ループ ---
        function loop(time) {
            // モーション速度（スロー再生）/ ズーム（引き）をスライダーから取得
            const _spdEl = document.getElementById('motionSpeed');
            const _spd = _spdEl ? (parseFloat(_spdEl.value) || 1) : 1;
            const _zEl = document.getElementById('viewZoom');
            const _zoom = _zEl ? (parseFloat(_zEl.value) || 1) : 1;

            // 固定タイムステップ + 実時間蓄積でスロー再生する。
            // dtを直接縮めるとフレーム結合した物理(宙返りの上昇等)が歪むため、
            // 物理は常に1/60秒刻みで進め、進める「頻度」だけを速度で変える。
            const FIXED_DT = 1 / 60;
            const realElapsed = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;
            if (window.__simAccum === undefined) window.__simAccum = 0;
            window.__simAccum += realElapsed * _spd;
            let _runUpdate = false;
            if (!isPaused && window.__simAccum >= FIXED_DT) {
                window.__simAccum -= FIXED_DT;
                if (window.__simAccum > FIXED_DT * 3) window.__simAccum = FIXED_DT * 3; // バックログ制限
                _runUpdate = true;
            }
            // コマ送り: 一時停止中に1ステップだけ進める
            if (isPaused && window.__stepFrameRequested) {
                window.__stepFrameRequested = false;
                window.__simAccum = 0;
                _runUpdate = true;
            }
            const dt = FIXED_DT;
            window.game.state = _runUpdate ? 'playing' : 'paused';

            if (typeof lastNinjaSubIndex === 'undefined') window.lastNinjaSubIndex = -1;

            if (_runUpdate) {
                // 状態・入力の同期
                if (isShogunMode()) {
                    // 将軍はゲームの実プレイアブル将軍。移動・ジャンプ・ダッシュ・しゃがみ・攻撃・
                    // 二刀Zは shogunPlayer.update → combatController.handleInput が処理する。
                    // 奥義(SPECIAL)はゲージ充填のため UI(btnOugi)経由。
                    if (input.isActionJustPressed('SPECIAL')) document.getElementById('btnOugi').click();
                    // サブ武器切替(C): 実ゲームと同じく player.subWeapons/currentSubWeapon を切り替える。
                    if (input.isActionJustPressed('SWITCH_WEAPON')) cycleSubWeapon();
                    // プレビューUIで選択中のサブ武器をプレイヤーに装備（アイドル時のみ）。
                    // ゲームの switchSubWeapon 相当: プレイヤーの currentSubWeapon(実装備)に設定すると
                    // 戦闘コントローラが内部ボスの _subWeaponKey へ反映し、X(SUB_WEAPON)で発動できる。
                    const _shogunBusy = shogun._attackTimer > 0 || shogun._subTimer > 0 || shogun.isAttacking;
                    if (!_shogunBusy && window._previewWeapon) {
                        equipShogunPreviewWeapon(window._previewWeapon);
                    }
                    shogunPlayer.update(dt, [], []);
                } else {
                    // 忍者は previewMode=false なので、移動・ジャンプ・ダッシュ・しゃがみ・攻撃・忍具は
                    // ninja.update → handleInput が実ゲームと同じロジックで処理する（手動移動は廃止）。
                    // 奥義(SPECIAL)だけはプレビューでゲージを充填して発動させたいので UI(btnOugi)経由にする。
                    if (input.isActionJustPressed('SPECIAL')) document.getElementById('btnOugi').click();

                    // 忍者の更新。入力処理・物理・サブ武器更新も内部で完結。
                    ninja.update(dt, [], []);

                    // 忍者の忍具切り替えを監視してUI同期
                    if (ninja.subWeaponIndex !== window.lastNinjaSubIndex) {
                        window.lastNinjaSubIndex = ninja.subWeaponIndex;
                        const currentName = ninja.currentSubWeapon?.name;
                        const targetKey = Object.keys(subWeaponNames).find(k => subWeaponNames[k] === currentName);
                        if (targetKey) {
                            // 内部インデックスのみ同期し、cycleSubWeaponは呼ばない
                            const sIdx = subWeapons.indexOf(targetKey);
                            if (sIdx !== -1) subIndex = sIdx;
                            window._previewWeapon = targetKey;
                            equipShogunPreviewWeapon(targetKey);
                        }
                        updateUI();
                    }
                }

                // グローバルオブジェクト更新
                if (window.game.bombs) {
                    window.game.bombs.forEach(b => { if (b.update) b.update(dt, groundY, []); });
                    window.game.bombs = window.game.bombs.filter(b => !b.isDestroyed);
                }
                window.game.projectiles.forEach(p => { if (p.update) p.update(dt, groundY, []); });
                window.game.projectiles = window.game.projectiles.filter(p => !p.isDead && !p.isDestroyed);

                // 画面端ループ処理（ズーム引き時は実際に見えている範囲の端で折り返す）
                const _halfViewW = (logicalW / 2) / _zoom;
                const _viewLeft = logicalW / 2 - _halfViewW;
                const _viewRight = logicalW / 2 + _halfViewW;
                if (isShogunMode()) {
                    let _wrapped = null;
                    if (shogunPlayer.x < _viewLeft - shogunPlayer.width - 20) _wrapped = _viewRight + 10;
                    else if (shogunPlayer.x > _viewRight + 20) _wrapped = _viewLeft - shogunPlayer.width - 10;
                    if (_wrapped !== null) {
                        // 内部ボスが座標の正で、毎フレーム p.x = boss.x と同期されるため、ボス側も更新する
                        shogunPlayer.x = _wrapped;
                        if (shogun) shogun.x = _wrapped;
                    }
                } else {
                    if (ninja.x < _viewLeft - ninja.width - 20) ninja.x = _viewRight + 10;
                    else if (ninja.x > _viewRight + 20) ninja.x = _viewLeft - ninja.width - 10;
                }
            }

            // 描画 (一時停止中も描画は継続)
            // 背景はズームに関わらず常に全面を塗る（引き表示時に隙間が出ないように）
            ctx.fillStyle = '#333'; ctx.fillRect(0, 0, logicalW, logicalH);

            // ズーム（引き表示）: キャラ立ち位置を中心に拡大/縮小（_zoomはループ先頭で取得済み）
            ctx.save();
            if (_zoom !== 1) {
                const _pivotX = logicalW / 2, _pivotY = groundY - 50;
                ctx.translate(_pivotX, _pivotY);
                ctx.scale(_zoom, _zoom);
                ctx.translate(-_pivotX, -_pivotY);
            }

            // 地面・中心線はズームアウトでも端まで覆うよう広めに描く
            ctx.fillStyle = '#555'; ctx.fillRect(-logicalW * 2, groundY, logicalW * 5, logicalH * 4);
            ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(logicalW / 2, -logicalH); ctx.lineTo(logicalW / 2, logicalH * 2); ctx.stroke();

            window.game.projectiles.forEach(p => { if (p.render) p.render(ctx); });

            if (isShogunMode()) {
                // ゲームと同じ描画経路: player.render → _renderShogunBody → boss.renderBody。
                // 隠れ身の透明度・剣筋・サブ武器・奥義分身もこの中でゲームと同様に処理される。
                shogunPlayer.render(ctx, {});
            } else {
                ninja.render(ctx);
                if (ninja.renderComboSlashTrail) ninja.renderComboSlashTrail(ctx);
                if (ninja.renderDualBladeSlashTrails) ninja.renderDualBladeSlashTrails(ctx);
                if (ninja.currentSubWeapon && !ninja.subWeaponRenderedInModel && ninja.currentSubWeapon.render) {
                    ninja.currentSubWeapon.render(ctx, ninja);
                }
            }
            // 火薬玉はキャラクターより前面に描画する
            if (window.game.bombs) window.game.bombs.forEach(b => { if (b.render) b.render(ctx); });
            ctx.restore();
            
            // UIの同期
            updateUI();
            
            // 入力状態の更新（フレームの最後で行うことで、現在のフレーム内でJustPressedが正しく拾えるようにする）
            input.update();
            
            requestAnimationFrame(loop);
        }
        switchChar('shogun');
        requestAnimationFrame(loop);
    </script>
</body>
</html>
