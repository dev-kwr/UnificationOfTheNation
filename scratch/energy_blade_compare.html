okeStyle = 'rgba(248,253,255,' + coreAlpha + ')';\n    ctx.lineWidth = lw;\n    ctx.beginPath();\n    for (let k = 0; k <= NODES; k++) { const p = pts[k]; if (k === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); }\n    ctx.stroke();\n};\n\nconst arcAmp = gHalf * 0.62;                // 振れ幅は刃幅以内に収め、刃に「沿う」印象\nfor (let a = 0; a < nArcs; a++) {\n    const seed = bucket * 13.0 + a * 101.3;\n    // 各弧は刃の一部区間を走る(全長でなく区間=より雷っぽい)\n    const s = 0.06 + 0.5 * hash(seed + 0.5);\n    const span = 0.28 + 0.34 * hash(seed + 1.5);\n    const t0 = s, t1 = Math.min(0.98, s + span);\n    // バケット内フェーズ: 立ち上がり鋭く→減衰(電弧のスパーク感)\n    const phase = (_now - bucket * BUCKET_MS) / BUCKET_MS;     // 0..1\n    const life = Math.pow(1 - phase, 1.6);                      // 鋭く減衰\n    if (life < 0.05) continue;\n    const amp = arcAmp * (0.5 + 0.5 * hash(seed + 2.5));\n    drawFilament(seed, t0, t1, amp, Math.max(0.9, gHalf * 0.12), 0.85 * life, 0.55 * life);\n}\n\n// =========================================================================\n// (C) フラッシュ: 電弧の立ち上がり(各バケット冒頭)に同期した鋭い白閃光。\n//     sine明滅の置換 — エネルギーが「弾ける」瞬間だけ芯が増光する。\n// =========================================================================\nconst phase0 = (_now - bucket * BUCKET_MS) / BUCKET_MS;\nconst flash = Math.pow(1 - Math.min(1, phase0 / 0.45), 2.2);   // バケット頭でピーク→急減衰\n// バケットによってフラッシュ強度を変える(毎回同じに光らせない)\nconst flashGate = 0.45 + 0.55 * hash(bucket * 5.3);\nif (flash * flashGate > 0.06) {\n    const fa = flash * flashGate;\n    ctx.shadowColor = 'rgba(226,246,255,' + (0.9 * fa) + ')';\n    ctx.shadowBlur = 12;\n    ctx.strokeStyle = 'rgba(255,255,255,' + (0.55 * fa) + ')';\n    ctx.lineWidth = Math.max(1.6, gHalf * 0.40);\n    traceCenter(); ctx.stroke();\n    ctx.shadowBlur = 0;\n}\n\nctx.restore();"}, {"seed": "energy-stream-internal", "label": "⑥内部に光が流れる(参考)", "needseg": false, "code": "                // ===== 大薙: スリムな\"流体光刃\" (INTERNAL FLOWING ENERGY) =====\n                // 設計: 単一の流れ帯ではなく、刃の内部を多数の細い光の筋(striation)が\n                // 速度・位相・振幅ばらばらに流れる=溶けた光/光の河。芯は白熱、縁はリム光。\n                // 明滅は廃止。明るさは一定(高級感)で、\"動き\"は内部フローだけが担う。\n                const lengthScale = 1.85;\n                const widthScale  = 3.0;     // <-- SLIM: whiteHalf*3.0 (旧9.0)\n                const gBl = (bladeEnd - bladeStart) * lengthScale;\n                const gTX = (t) => bladeStart + gBl * t;\n                const gArcY = (t) => -(Math.pow(t * lengthScale, 1.8) * (bl * 0.18)) + 0.06;\n                const gHalf = whiteHalf * widthScale;\n                // 太刀らしい細身プロファイル: 柄側で素早く立ち上げ→緩い腹→長く尖る切先。\n                const gHalfW = (t) => {\n                    const ramp  = Math.min(1, t / 0.05);                 // 柄の立ち上がり\n                    const belly = 0.62 + 0.38 * Math.sin(Math.min(1, t / 0.9) * Math.PI * 0.85); // 緩い腹\n                    const tip   = Math.pow(Math.min(1, (1 - t) / 0.16), 0.7); // 長い先細り\n                    return gHalf * ramp * belly * tip;\n                };\n                const SEGg = 44;\n                const _now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : 0;\n                const T = _now * 0.001;\n\n                // 中心線/法線(幅方向の単位ベクトル)/半幅を前計算\n                const cx = new Array(SEGg + 1), cy = new Array(SEGg + 1);\n                const nx = new Array(SEGg + 1), ny = new Array(SEGg + 1), hw = new Array(SEGg + 1);\n                for (let i = 0; i <= SEGg; i++) {\n                    const t = i / SEGg;\n                    cx[i] = gTX(t); cy[i] = gArcY(t); hw[i] = gHalfW(t);\n                }\n                for (let i = 0; i <= SEGg; i++) {\n                    const a = Math.max(0, i - 1), b = Math.min(SEGg, i + 1);\n                    let dx = cx[b] - cx[a], dy = cy[b] - cy[a];\n                    const len = Math.hypot(dx, dy) || 1; dx /= len; dy /= len;\n                    nx[i] = -dy; ny[i] = dx; // 法線(幅方向)\n                }\n                const traceSilhouetteW = (wf) => {\n                    ctx.beginPath();\n                    for (let i = 0; i <= SEGg; i++) { const x = cx[i] + nx[i] * hw[i] * wf, y = cy[i] + ny[i] * hw[i] * wf; if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); }\n                    for (let i = SEGg; i >= 0; i--) { ctx.lineTo(cx[i] - nx[i] * hw[i] * wf, cy[i] - ny[i] * hw[i] * wf); }\n                    ctx.closePath();\n                };\n\n                ctx.save();\n                ctx.globalCompositeOperation = 'lighten';\n                ctx.lineJoin = 'round'; ctx.lineCap = 'round';\n\n                // (1) 外周オーラ: 刃形に沿う広い光暈(柔らかい一定光・脈動なし)\n                ctx.shadowColor = 'rgba(120,224,255,0.70)';\n                ctx.shadowBlur = 22;\n                ctx.fillStyle = 'rgba(70,180,255,0.16)';\n                traceSilhouetteW(1.18); ctx.fill();\n                ctx.shadowBlur = 0;\n\n                // (2) エネルギー本体: 縁=淡藍→芯=明 の幅方向グラデ(同心塗り・一定光)\n                ctx.fillStyle = 'rgba(96,196,255,0.26)'; traceSilhouetteW(1.0);  ctx.fill();\n                ctx.fillStyle = 'rgba(150,224,255,0.24)'; traceSilhouetteW(0.66); ctx.fill();\n\n                // (3) 内部フロー: 多数の細い光条をシルエットでクリップして流す(=光の河)\n                ctx.save();\n                traceSilhouetteW(1.0); ctx.clip();   // 筋は絶対に刃の外へ出さない\n                const STR = 13;                       // 光条本数\n                for (let s = 0; s < STR; s++) {\n                    // 各筋ごとの固有値(決定的): 横レーン・速度・位相\n                    const f1 = Math.sin(s * 12.9898) * 43758.5453; const r1 = f1 - Math.floor(f1);\n                    const f2 = Math.sin(s * 12.9898 + 7.13) * 24634.6345; const r2 = f2 - Math.floor(f2);\n                    const lane  = (r1 - 0.5) * 1.7;          // -0.85..0.85 (芯寄り多め)\n                    const speed = 0.45 + r2 * 0.85;          // 流速ばらつき\n                    const phase = r1 * 6.28 + s;             // 位相ばらつき\n                    const flow  = (T * speed + phase) % 6.283185;\n                    const env   = 0.5 + 0.5 * Math.sin(flow);  // 連続包絡(=明滅でなく流れのフェード)\n                    const coreBias = 1 - Math.abs(lane);       // 芯寄りほど明るく太く\n                    const alpha = (0.10 + 0.16 * env) * (0.45 + 0.55 * coreBias);\n                    if (alpha < 0.02) continue;\n                    ctx.beginPath();\n                    let started = false;\n                    for (let i = 2; i <= SEGg - 1; i++) {\n                        const t = i / SEGg;\n                        // 横位置のゆるい蛇行(刃に沿う縦波)=溶けた光の質感\n                        const wob = Math.sin(t * 9.0 + flow * 1.3 + s) * 0.16 + Math.sin(t * 3.0 - flow) * 0.10;\n                        const off = (lane + wob) * hw[i] * 0.9;\n                        const px = cx[i] + nx[i] * off, py = cy[i] + ny[i] * off;\n                        if (!started) { ctx.moveTo(px, py); started = true; } else ctx.lineTo(px, py);\n                    }\n                    ctx.strokeStyle = 'rgba(' + (200 + Math.round(40 * coreBias)) + ',' +\n                                      (238 + Math.round(14 * coreBias)) + ',255,' + alpha.toFixed(3) + ')';\n                    ctx.lineWidth = (0.6 + 1.4 * coreBias) * (0.7 + 0.5 * env);\n                    ctx.stroke();\n                }\n                ctx.restore(); // clip 解除\n\n                // (4) 高温の芯: 中心の白熱(一定光・ぼかし)。刀らしさを担保\n                ctx.shadowColor = 'rgba(220,248,255,0.85)';\n                ctx.shadowBlur = 9;\n                ctx.strokeStyle = 'rgba(248,253,255,0.7)';\n                ctx.lineWidth = Math.max(1.6, gHalf * 0.26);\n                ctx.beginPath();\n                for (let i = 0; i <= SEGg; i++) { if (i === 0) ctx.moveTo(cx[i], cy[i]); else ctx.lineTo(cx[i], cy[i]); }\n                ctx.stroke();\n                ctx.shadowBlur = 0;\n\n                // (5) リム光: 刃側エッジの細い高輝度ライン(エネルギーの張り=高級感)\n                ctx.strokeStyle = 'rgba(186,236,255,0.5)';\n                ctx.lineWidth = 0.9;\n                ctx.beginPath();\n                for (let i = 1; i <= SEGg; i++) {\n                    const x = cx[i] + nx[i] * hw[i] * 0.92, y = cy[i] + ny[i] * hw[i] * 0.92;\n                    if (i === 1) ctx.moveTo(x, y); else ctx.lineTo(x, y);\n                }\n                ctx.stroke();\n\n                ctx.restore();"}];
function getArcY(t,bl){ return -(Math.pow(t,1.8)*bl*0.18)+0.06; }
function makeFn(code,needseg){
  const pre = needseg ? 'const seg=56;\n' : '';
  return new Function('ctx','bladeStart','bladeEnd','bl','whiteHalf','getArcY','getTX', pre+code);
}
function drawDarkKatana(ctx,bladeStart,bladeEnd,bl,whiteHalf,gA,getTX){
  // 本体の暗い刀(エフェクトの手前に重なる)。白刀身+黒峰の簡易版。
  const seg=48;
  ctx.save();
  ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();
  for(let i=0;i<=seg;i++){const t=i/seg;ctx.lineTo(getTX(t),gA(t)-whiteHalf);}
  for(let i=seg;i>=0;i--){const t=i/seg;ctx.lineTo(getTX(t),gA(t)+whiteHalf*Math.min(1,(1-t)/0.12));}
  ctx.closePath();
  ctx.fillStyle='#e8eef6';ctx.fill();
  // 峰側の黒
  ctx.beginPath();
  for(let i=0;i<=seg;i++){const t=i/seg;ctx.lineTo(getTX(t),gA(t)-whiteHalf);}
  for(let i=seg;i>=0;i--){const t=i/seg;ctx.lineTo(getTX(t),gA(t)+whiteHalf*0.15);}
  ctx.closePath();
  ctx.fillStyle='#14181f';ctx.fill();
  ctx.restore();
}
const wrap=document.getElementById('wrap');
const cells=CONCEPTS.map(c=>{
  const d=document.createElement('div');d.className='cell';
  const lab=document.createElement('div');lab.className='lab';lab.textContent=c.label;d.appendChild(lab);
  const cv=document.createElement('canvas');cv.width=760;cv.height=760;cv.style.width='380px';cv.style.height='380px';d.appendChild(cv);
  wrap.appendChild(d);
  let fn=null,err=null;
  try{ fn=makeFn(c.code,c.needseg); }catch(e){ err='compile:'+e.message; }
  if(err){const ed=document.createElement('div');ed.className='err';ed.textContent=err;d.appendChild(ed);}
  return {c,cv,ctx:cv.getContext('2d'),fn,d};
});
function frame(){
  cells.forEach(cell=>{
    const ctx=cell.ctx; ctx.clearRect(0,0,760,760);
    ctx.save();
    ctx.translate(760*0.40, 760*0.84);     // 柄位置(下寄り)
    ctx.rotate(-1.12);                      // 上やや右へ
    ctx.scale(2.0,2.0);
    const bladeStart=0, bl=130, bladeEnd=130;
    const getTX=(t)=>bladeStart+(bladeEnd-bladeStart)*t;
    const gA=(t)=>getArcY(t,bl);
    if(cell.fn){
      try{ ctx.save(); cell.fn(ctx,bladeStart,bladeEnd,bl,2.2,gA,getTX); ctx.restore(); }
      catch(e){ ctx.restore(); if(!cell._err){cell._err=1;const ed=document.createElement('div');ed.className='err';ed.textContent='run:'+e.message;cell.d.appendChild(ed);} ctx.restore?.(); }
    }
    drawDarkKatana(ctx,bladeStart,bladeEnd,bl,2.2,gA,getTX);
    ctx.restore();
  });
}
setInterval(frame, 16);
frame();
