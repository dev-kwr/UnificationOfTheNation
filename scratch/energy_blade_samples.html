<meta charset="utf-8">

<style>

    --line:#1d2740; --line2:#2b3a5c;
    --ink:#e6eef9; --muted:#8395b2; --faint:#5b6b88;

  }
  *{box-sizing:border-box}
  .page{background:
      radial-gradient(140% 80% at 50% -10%, #121a2c 0%, var(--ground) 60%);
      min-height:100vh;color:var(--ink);font-family:var(--sans);
      padding:30px 26px 48px;-webkit-font-smoothing:antialiased}
  .eyebrow{font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--energy-dim);font-weight:700;margin:0 0 8px}
  h1{font-size:clamp(22px,3.4vw,32px);font-weight:700;letter-spacing:.01em;margin:0 0 8px;text-wrap:balance}
  h1 .sub{color:var(--energy)}
  .lead{font-size:14px;line-height:1.6;color:var(--muted);max-width:62ch;margin:0 0 4px}
  .hint{font-size:12.5px;color:var(--faint);margin:6px 0 22px}
  .hint b{color:var(--muted);font-weight:600}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px;max-width:1500px}
  .card{position:relative;display:block;width:100%;aspect-ratio:1/1.18;padding:0;border:1px solid var(--line);border-radius:14px;
    background:radial-gradient(120% 92% at 32% 72%, #18223a 0%, #0b1019 72%);

  .card canvas{position:absolute;inset:0;width:100%;height:100%}
  .badge{position:absolute;left:12px;top:11px;z-index:3;width:26px;height:26px;border-radius:50%;

  .tag{position:absolute;right:11px;top:13px;z-index:3;font-size:10.5px;font-weight:700;letter-spacing:.12em;
    padding:3px 8px;border-radius:999px;text-transform:uppercase}
  .tag.now{background:rgba(240,192,105,.16);color:var(--amber);border:1px solid rgba(240,192,105,.4)}
  .tag.ref{background:rgba(131,149,178,.14);color:var(--muted);border:1px solid #2b3a5c}
  .meta{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:34px 14px 13px;
    background:linear-gradient(to top, #060910f2 0%, #060910cc 55%, transparent 100%)}
  .name{font-size:15.5px;font-weight:700;margin-bottom:3px}
  .desc{font-size:12px;line-height:1.5;color:var(--muted)}
  .sel-note{position:absolute;left:14px;bottom:13px;z-index:4;font-size:12px;font-weight:700;color:var(--energy);
    opacity:0;transform:translateY(4px);transition:opacity .2s, transform .2s}
  .card.sel .meta{opacity:0}
  .card.sel .sel-note{opacity:1;transform:none}
  footer{margin:26px 0 0;font-size:12px;color:var(--faint);max-width:62ch;line-height:1.6}
  @media (prefers-reduced-motion: reduce){ .card{transition:none} }
</style>

<div class="page">

<button class="card" data-i="2" data-name="エネルギー波が駆け上がる">

<script>
function fx_0(ctx,bladeStart,bladeEnd,bl,whiteHalf,getArcY,getTX){
const seg=56;
// 【大薙: 生けるオーラ刃】細身の発光刀身(中心は白熱コア)を実刀の反りに沿って前方へ延長し、
// 峰側・刃側・切先からエネルギーの"舌(オーラ tongue)"が舐め出しては消える=炎を纏った刀。
// 明滅(全体脈動)も流動ハイライト帯も使わない。動きは tongue 群の位相ずれ生滅から生まれる。
// lighten 合成・描画専用=判定不変。
{
    const lengthScale = 1.82;                                  // 長さ(実刀の約1.8倍)
    const gBl = (bladeEnd - bladeStart) * lengthScale;
    const gTX = (t) => bladeStart + gBl * t;
    const gArcY = (t) => -(Math.pow(t * lengthScale, 1.8) * (bl * 0.18)) + 0.06; // 実刀 getArcY に一致して延長
    // 【細身の葉形プロファイル】根本で素早く立ち上げ→中ほど(腹)で最大→切先で針のように先細り。
    const gHalf = whiteHalf * 3.0;                             // 最大半幅は実刀の3倍まで(スリム)
    const tipSharp = 0.74;
    const gHalfW = (t) => {
        const root  = Math.min(1, t / 0.05);
        const belly = 0.34 + 0.66 * Math.pow(Math.sin(Math.min(1, t / tipSharp) * Math.PI * 0.5), 0.85);
        const taper = t <= tipSharp ? 1 : Math.max(0, 1 - (t - tipSharp) / (1 - tipSharp));
        return gHalf * root * belly * Math.pow(taper, 1.35);
    };
    const SEGg = 44;
    const _now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : 0;
    const T = _now * 0.001;
    // 決定論的な擬似ノイズ(seed+時間の多重 sin/cos)。tongue の揺れ・伸びを有機的だが安定にする。
    const noise2 = (a, b) =>
        0.5 + 0.5 * (0.6 * Math.sin(a) + 0.4 * Math.sin(a * 1.7 + b * 1.3) * Math.cos(b * 0.7 + 1.1));
    // 中心線の接線(数値微分)
    const tan = (t) => {
        const dt = 0.004, t0 = Math.max(0, t - dt), t1 = Math.min(1, t + dt);
        const dx = gTX(t1) - gTX(t0), dy = gArcY(t1) - gArcY(t0);
        const m = Math.hypot(dx, dy) || 1;
        return { x: dx / m, y: dy / m };
    };

    ctx.save();
    ctx.globalCompositeOperation = 'lighten';
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    // 閉じたシルエットを幅factor wf で描く(同心=幅方向グラデ用)
    const traceBladePath = (wf) => {
        ctx.beginPath();
        for (let i = 0; i <= SEGg; i++) {
            const t = i / SEGg, x = gTX(t), y = gArcY(t) - gHalfW(t) * wf;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        for (let i = SEGg; i >= 0; i--) {
            const t = i / SEGg;
            ctx.lineTo(gTX(t), gArcY(t) + gHalfW(t) * wf);
        }
        ctx.closePath();
    };

    // 【呼吸】明滅ではなく、ごく緩やかな2周波の息づき(0近くまで落とさない=ストロボにしない)
    const breathe = 0.86 + 0.14 * Math.sin(T * 1.9) * Math.sin(T * 0.7 + 0.6);

    // (1) 外周オーラ(ぼかし): 刃形に沿う広い光暈
    ctx.shadowColor = 'rgba(120,214,255,' + (0.55 * breathe) + ')';
    ctx.shadowBlur = 22;
    ctx.fillStyle = 'rgba(96,196,255,' + (0.14 * breathe) + ')';
    traceBladePath(1.18); ctx.fill();
    ctx.shadowBlur = 0;
    // (2) 幅方向グラデ: 縁=淡→芯=明のエネルギー本体(細身でも厚みを感じる)
    ctx.fillStyle = 'rgba(120,210,255,' + (0.26 * breathe) + ')'; traceBladePath(1.0);  ctx.fill();
    ctx.fillStyle = 'rgba(176,232,255,' + (0.30 * breathe) + ')'; traceBladePath(0.58); ctx.fill();
    // (3) 溶けたコア: 長手方向の固定グラデ(柄=透明→中ほど白熱→切先の先で透明)。帯は"流れない"。
    {
        const coreGrad = ctx.createLinearGradient(gTX(0), gArcY(0), gTX(1), gArcY(1));
        coreGrad.addColorStop(0.00, 'rgba(214,244,255,0.0)');
        coreGrad.addColorStop(0.12, 'rgba(232,250,255,' + (0.50 * breathe) + ')');
        coreGrad.addColorStop(0.55, 'rgba(255,255,255,' + (0.62 * breathe) + ')');
        coreGrad.addColorStop(0.90, 'rgba(236,250,255,' + (0.50 * breathe) + ')');
        coreGrad.addColorStop(1.00, 'rgba(214,244,255,0.0)');
        ctx.fillStyle = coreGrad;
        traceBladePath(0.30); ctx.fill();
    }
    // (4) 白熱の芯線(ぼかし発光)
    ctx.shadowColor = 'rgba(228,248,255,' + (0.70 * breathe) + ')';
    ctx.shadowBlur = 8;
    ctx.strokeStyle = 'rgba(250,254,255,' + (0.55 * breathe) + ')';
    ctx.lineWidth = Math.max(1.4, gHalf * 0.16);
    ctx.beginPath();
    for (let i = 0; i <= SEGg; i++) {
        const t = i / SEGg, x = gTX(t), y = gArcY(t);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // (5) 【オーラの舌】輪郭から舐め出して伸び・カールし・消える炎片。位相ずれで生滅=有機的な動き。
    const cycle = 1.3;
    const drawTongue = (t, side, phase) => {
        const life = ((T + phase) % cycle) / cycle;
        const env = Math.sin(life * Math.PI);                 // 生滅エンベロープ(明滅でなく個別フェード)
        if (env < 0.02) return;
        const bx = gTX(t);
        const by = gArcY(t) + side * gHalfW(t) * 0.92;        // 輪郭(峰 or 刃)上の基点
        const tg = tan(t);
        // 外向き法線: side(峰=-1/刃=+1)と同じy符号になるよう向きを決める(峰は-y側、刃は+y側へ)
        let nx = tg.y, ny = -tg.x;
        if (Math.sign(ny) !== Math.sign(side)) { nx = -nx; ny = -ny; }
        const outx = nx, outy = ny;
        const wob   = (noise2(t * 9.0 + phase * 5.0, T * 1.3 + phase) - 0.5) * 2.0;
        const reach = gHalf * (1.0 + 1.4 * env) * (0.7 + 0.5 * noise2(phase * 3.1, t * 4.0));
        const driftAlong = (0.30 + 0.45 * wob);               // 符号付き=前後どちらにもなびく
        const segc = 5;
        const pts = [];
        for (let k = 0; k <= segc; k++) {
            const f = k / segc;
            const grow  = Math.pow(f, 0.82) * reach * env;                       // 縁から外へ伸びる
            const along = driftAlong * f * gHalf * (0.5 + 0.6 * env);            // 刃に沿うなびき
            const curl  = Math.sin(f * Math.PI * 0.85 + wob) * gHalf * 0.55 * f * env; // S字の炎カール
            pts.push({
                x: bx + outx * grow + tg.x * (along + curl),
                y: by + outy * grow + tg.y * (along + curl)
            });
        }
        // 外側の青いグロー
        ctx.shadowColor = 'rgba(150,222,255,' + (0.50 * env) + ')';
        ctx.shadowBlur = 7;
        ctx.strokeStyle = 'rgba(150,224,255,' + (0.42 * env) + ')';
        ctx.lineWidth = gHalf * 0.50 * (0.5 + 0.5 * env);
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let k = 1; k < pts.length; k++) ctx.lineTo(pts[k].x, pts[k].y);
        ctx.stroke();
        // 白熱の芯
        ctx.shadowBlur = 4;
        ctx.strokeStyle = 'rgba(244,252,255,' + (0.50 * env) + ')';
        ctx.lineWidth = gHalf * 0.20 * (0.5 + 0.5 * env);
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let k = 1; k < pts.length; k++) ctx.lineTo(pts[k].x, pts[k].y);
        ctx.stroke();
        ctx.shadowBlur = 0;
    };
    // 峰側(主役): 黄金比で位相を散らし、ばらばらに生滅させる
    const TONGUES = 13;
    for (let n = 0; n < TONGUES; n++) {
        const t = 0.08 + (n / (TONGUES - 1)) * 0.86;
        const phase = ((n * 0.6180339887) % 1.0) * cycle;
        drawTongue(t, -1, phase);
    }
    // 刃側(控えめ): 切先寄りに少数
    for (let n = 0; n < 5; n++) {
        const t = 0.55 + (n / 4) * 0.40;
        const phase = (((n * 0.37 + 0.21)) % 1.0) * cycle;
        drawTongue(t, +1, phase);
    }

    // (6) 切先のチャージ火種: 独立した緩い周期で脈動する小さな放射グラデ
    {
        const tipX = gTX(1.0), tipY = gArcY(1.0);
        const fenv = Math.sin(((T * 0.9) % 1.0) * Math.PI);
        const r = gHalf * (1.2 + 0.8 * fenv);
        const tipGrad = ctx.createRadialGradient(tipX, tipY, 0, tipX, tipY, r);
        tipGrad.addColorStop(0.0, 'rgba(255,255,255,' + (0.50 * (0.5 + 0.5 * fenv)) + ')');
        tipGrad.addColorStop(0.4, 'rgba(170,228,255,' + (0.30 * (0.5 + 0.5 * fenv)) + ')');
        tipGrad.addColorStop(1.0, 'rgba(120,200,255,0)');
        ctx.fillStyle = tipGrad;
        ctx.beginPath();
        ctx.arc(tipX, tipY, r, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
}
}
function fx_1(ctx,bladeStart,bladeEnd,bl,whiteHalf,getArcY,getTX){
const seg=56;
// ===== 大薙: CHROMATIC PLASMA CORE + FRESNEL RIM (laser-katana) =====
// Slim white-hot core bleeding white->cyan->azure->indigo, contour = brightest (fresnel rim),
// life = per-point phase-offset shimmer + ultra-slow chromatic drift. No global pulse, no sliding band.
{
    const lengthScale = 1.8;                 // 刀の何倍まで伸ばすか
    const gBl = (bladeEnd - bladeStart) * lengthScale;
    const gTX = (t) => bladeStart + gBl * t;
    // 中心線は実刀の反りに一致させ、先まで同式で延長
    const gArcY = (t) => -(Math.pow(t * lengthScale, 1.8) * (bl * 0.18)) + 0.06;
    const SEGg = 48;
    const _now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : 0;

    // --- SLIM katana width profile: peak ~3.4x whiteHalf, sharp tip ---
    const gHalf = whiteHalf * 3.4;           // belly peak half-width (slim, <=4x)
    const gHalfW = (t) => {
        const ramp = Math.min(1, t / 0.05);              // 柄側で素早く立ち上げ
        const taper = Math.pow(Math.min(1, (1 - t) / 0.40), 0.85); // 切先へ長く先細り(鋭い)
        const belly = 1 - 0.30 * (t - 0.42) * (t - 0.42) / 0.18;   // ゆるい腹
        return gHalf * ramp * taper * Math.max(0.30, belly);
    };

    // --- per-point organic shimmer (different phase along the blade) ---
    // 大域一様な明滅は禁止。各点が少しずつ位相をずらして息づく=光が刃に沿ってさざ波立つ。
    const shimmer = (t) => {
        const p = t * 6.2831853;
        return 0.5 + 0.5 * (
            0.50 * Math.sin(_now * 0.0042 + p * 2.0) +
            0.30 * Math.sin(_now * 0.0090 - p * 3.3 + 1.7) +
            0.20 * Math.sin(_now * 0.0170 + p * 5.1 + 4.0)
        );
    };
    // ultra-slow chromatic temperature drift (azure <-> indigo), ~3.5s, classy not blinky
    const drift = 0.5 + 0.5 * Math.sin(_now * 0.0018);

    const traceSilhouetteW = (wf) => {
        ctx.beginPath();
        for (let i = 0; i <= SEGg; i++) { const t = i / SEGg; const x = gTX(t), y = gArcY(t) - gHalfW(t) * wf; if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); }
        for (let i = SEGg; i >= 0; i--) { const t = i / SEGg; ctx.lineTo(gTX(t), gArcY(t) + gHalfW(t) * wf); }
        ctx.closePath();
    };

    ctx.save();
    ctx.globalCompositeOperation = 'lighten';
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    // (1) OUTER AURA: soft blurred halo following the slim blade (one cheap blur pass)
    ctx.shadowColor = 'rgba(70,150,255,0.55)';
    ctx.shadowBlur = 22;
    ctx.fillStyle = 'rgba(46,86,210,0.16)';
    traceSilhouetteW(1.0); ctx.fill();
    ctx.shadowBlur = 0;

    // (2) CHROMATIC BODY: concentric fills, contour=indigo -> mid=azure -> inner=cyan-white.
    //     色温度ドリフトでazure/indigoの混合を超低速に動かす(明滅でなく色変化)。
    const indigoB = 200 + Math.round(35 * drift);   // 200..235
    ctx.fillStyle = 'rgba(54,86,' + indigoB + ',0.26)'; traceSilhouetteW(1.0); ctx.fill();   // deep indigo at contour
    ctx.fillStyle = 'rgba(72,168,255,0.26)';          traceSilhouetteW(0.60); ctx.fill();   // azure mid
    ctx.fillStyle = 'rgba(196,240,255,0.30)';         traceSilhouetteW(0.28); ctx.fill();   // cyan-white inner

    // (3) FRESNEL RIM: the SIGNATURE. Outline drawn as short segments whose brightness ripples
    //     per-point (shimmer) so light crawls along the contour from multiple seeds — never one band.
    ctx.shadowColor = 'rgba(150,210,255,0.9)';
    ctx.shadowBlur = 7;
    ctx.lineWidth = Math.max(1.1, gHalf * 0.16);
    const rimPt = (t, sideSign) => ({ x: gTX(t), y: gArcY(t) + sideSign * gHalfW(t) });
    for (let side = -1; side <= 1; side += 2) {
        for (let i = 0; i < SEGg; i++) {
            const t0 = i / SEGg, t1 = (i + 1) / SEGg;
            const a = 0.30 + 0.55 * shimmer((t0 + t1) * 0.5);   // local ripple alpha, steady base
            const p0 = rimPt(t0, side), p1 = rimPt(t1, side);
            ctx.strokeStyle = 'rgba(214,242,255,' + a.toFixed(3) + ')';
            ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); ctx.stroke();
        }
    }
    ctx.shadowBlur = 0;

    // (4) WHITE-HOT PLASMA CORE: thin near-white filament along the spine, locally shimmering.
    ctx.shadowColor = 'rgba(235,250,255,0.85)';
    ctx.shadowBlur = 6;

    ctx.shadowColor = 'rgba(150,224,255,' + glowAlpha + ')';
    ctx.shadowBlur = 9;
    ctx.strokeStyle = 'rgba(176,232,255,' + glowAlpha + ')';
    ctx.lineWidth = lw + 1.4;

    for (let k = 0; k <= NODES; k++) { const p = pts[k]; if (k === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); }

    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(248,253,255,' + coreAlpha + ')';
    ctx.lineWidth = lw;
    ctx.beginPath();
    for (let k = 0; k <= NODES; k++) { const p = pts[k]; if (k === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); }

const arcAmp = gHalf * 0.62;                // 振れ幅は刃幅以内に収め、刃に「沿う」印象
for (let a = 0; a < nArcs; a++) {
    const seed = bucket * 13.0 + a * 101.3;
    // 各弧は刃の一部区間を走る(全長でなく区間=より雷っぽい)
    const s = 0.06 + 0.5 * hash(seed + 0.5);
    const span = 0.28 + 0.34 * hash(seed + 1.5);
    const t0 = s, t1 = Math.min(0.98, s + span);
    // バケット内フェーズ: 立ち上がり鋭く→減衰(電弧のスパーク感)
    const phase = (_now - bucket * BUCKET_MS) / BUCKET_MS;     // 0..1
    const life = Math.pow(1 - phase, 1.6);                      // 鋭く減衰
    if (life < 0.05) continue;
    const amp = arcAmp * (0.5 + 0.5 * hash(seed + 2.5));
    drawFilament(seed, t0, t1, amp, Math.max(0.9, gHalf * 0.12), 0.85 * life, 0.55 * life);
}

// =========================================================================
// (C) フラッシュ: 電弧の立ち上がり(各バケット冒頭)に同期した鋭い白閃光。
//     sine明滅の置換 — エネルギーが「弾ける」瞬間だけ芯が増光する。
// =========================================================================
const phase0 = (_now - bucket * BUCKET_MS) / BUCKET_MS;
const flash = Math.pow(1 - Math.min(1, phase0 / 0.45), 2.2);   // バケット頭でピーク→急減衰
// バケットによってフラッシュ強度を変える(毎回同じに光らせない)
const flashGate = 0.45 + 0.55 * hash(bucket * 5.3);
if (flash * flashGate > 0.06) {
    const fa = flash * flashGate;
    ctx.shadowColor = 'rgba(226,246,255,' + (0.9 * fa) + ')';
    ctx.shadowBlur = 12;
    ctx.strokeStyle = 'rgba(255,255,255,' + (0.55 * fa) + ')';
    ctx.lineWidth = Math.max(1.6, gHalf * 0.40);
    traceCenter(); ctx.stroke();
    ctx.shadowBlur = 0;
}

ctx.restore();
}
function fx_5(ctx,bladeStart,bladeEnd,bl,whiteHalf,getArcY,getTX){
                // ===== 大薙: スリムな"流体光刃" (INTERNAL FLOWING ENERGY) =====
                // 設計: 単一の流れ帯ではなく、刃の内部を多数の細い光の筋(striation)が
                // 速度・位相・振幅ばらばらに流れる=溶けた光/光の河。芯は白熱、縁はリム光。
                // 明滅は廃止。明るさは一定(高級感)で、"動き"は内部フローだけが担う。
                const lengthScale = 1.85;
                const widthScale  = 3.0;     // <-- SLIM: whiteHalf*3.0 (旧9.0)
                const gBl = (bladeEnd - bladeStart) * lengthScale;
                const gTX = (t) => bladeStart + gBl * t;
                const gArcY = (t) => -(Math.pow(t * lengthScale, 1.8) * (bl * 0.18)) + 0.06;
                const gHalf = whiteHalf * widthScale;
                // 太刀らしい細身プロファイル: 柄側で素早く立ち上げ→緩い腹→長く尖る切先。
                const gHalfW = (t) => {
                    const ramp  = Math.min(1, t / 0.05);                 // 柄の立ち上がり
                    const belly = 0.62 + 0.38 * Math.sin(Math.min(1, t / 0.9) * Math.PI * 0.85); // 緩い腹
                    const tip   = Math.pow(Math.min(1, (1 - t) / 0.16), 0.7); // 長い先細り
                    return gHalf * ramp * belly * tip;

                const _now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : 0;
                const T = _now * 0.001;

                // 中心線/法線(幅方向の単位ベクトル)/半幅を前計算
                const cx = new Array(SEGg + 1), cy = new Array(SEGg + 1);
                const nx = new Array(SEGg + 1), ny = new Array(SEGg + 1), hw = new Array(SEGg + 1);
                for (let i = 0; i <= SEGg; i++) {
                    const t = i / SEGg;
                    cx[i] = gTX(t); cy[i] = gArcY(t); hw[i] = gHalfW(t);
                }
                for (let i = 0; i <= SEGg; i++) {
                    const a = Math.max(0, i - 1), b = Math.min(SEGg, i + 1);
                    let dx = cx[b] - cx[a], dy = cy[b] - cy[a];
                    const len = Math.hypot(dx, dy) || 1; dx /= len; dy /= len;
                    nx[i] = -dy; ny[i] = dx; // 法線(幅方向)
                }
                const traceSilhouetteW = (wf) => {
                    ctx.beginPath();
                    for (let i = 0; i <= SEGg; i++) { const x = cx[i] + nx[i] * hw[i] * wf, y = cy[i] + ny[i] * hw[i] * wf; if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); }
                    for (let i = SEGg; i >= 0; i--) { ctx.lineTo(cx[i] - nx[i] * hw[i] * wf, cy[i] - ny[i] * hw[i] * wf); }
                    ctx.closePath();
                };

                ctx.save();
                ctx.globalCompositeOperation = 'lighten';
                ctx.lineJoin = 'round'; ctx.lineCap = 'round';

                // (1) 外周オーラ: 刃形に沿う広い光暈(柔らかい一定光・脈動なし)
                ctx.shadowColor = 'rgba(120,224,255,0.70)';
                ctx.shadowBlur = 22;
                ctx.fillStyle = 'rgba(70,180,255,0.16)';
                traceSilhouetteW(1.18); ctx.fill();
                ctx.shadowBlur = 0;

                // (2) エネルギー本体: 縁=淡藍→芯=明 の幅方向グラデ(同心塗り・一定光)
                ctx.fillStyle = 'rgba(96,196,255,0.26)'; traceSilhouetteW(1.0);  ctx.fill();
                ctx.fillStyle = 'rgba(150,224,255,0.24)'; traceSilhouetteW(0.66); ctx.fill();

                // (3) 内部フロー: 多数の細い光条をシルエットでクリップして流す(=光の河)
                ctx.save();
                traceSilhouetteW(1.0); ctx.clip();   // 筋は絶対に刃の外へ出さない
                const STR = 13;                       // 光条本数
                for (let s = 0; s < STR; s++) {
                    // 各筋ごとの固有値(決定的): 横レーン・速度・位相
                    const f1 = Math.sin(s * 12.9898) * 43758.5453; const r1 = f1 - Math.floor(f1);
                    const f2 = Math.sin(s * 12.9898 + 7.13) * 24634.6345; const r2 = f2 - Math.floor(f2);
                    const lane  = (r1 - 0.5) * 1.7;          // -0.85..0.85 (芯寄り多め)
                    const speed = 0.45 + r2 * 0.85;          // 流速ばらつき

                    const coreBias = 1 - Math.abs(lane);       // 芯寄りほど明るく太く

                    if (alpha < 0.02) continue;

                        const t = i / SEGg;

                        const wob = Math.sin(t * 9.0 + flow * 1.3 + s) * 0.16 + Math.sin(t * 3.0 - flow) * 0.10;
                        const off = (lane + wob) * hw[i] * 0.9;
                        const px = cx[i] + nx[i] * off, py = cy[i] + ny[i] * off;

                ctx.restore(); // clip 解除

                ctx.shadowColor = 'rgba(220,248,255,0.85)';
                ctx.shadowBlur = 9;
                ctx.strokeStyle = 'rgba(248,253,255,0.7)';
                ctx.lineWidth = Math.max(1.6, gHalf * 0.26);
                ctx.beginPath();
                for (let i = 0; i <= SEGg; i++) { if (i === 0) ctx.moveTo(cx[i], cy[i]); else ctx.lineTo(cx[i], cy[i]); }
                ctx.stroke();
                ctx.shadowBlur = 0;

                // (5) リム光: 刃側エッジの細い高輝度ライン(エネルギーの張り=高級感)
                ctx.strokeStyle = 'rgba(186,236,255,0.5)';
                ctx.lineWidth = 0.9;
                ctx.beginPath();
                for (let i = 1; i <= SEGg; i++) {
                    const x = cx[i] + nx[i] * hw[i] * 0.92, y = cy[i] + ny[i] * hw[i] * 0.92;
                    if (i === 1) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();

                ctx.restore();
}
const FNS=[fx_0,fx_1,fx_2,fx_3,fx_4,fx_5];
function getArcY(t,bl){ return -(Math.pow(t,1.8)*bl*0.18)+0.06; }
function drawDarkKatana(ctx,bladeStart,bladeEnd,bl,whiteHalf,gA,getTX){
  const seg=48; ctx.save(); ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.beginPath();
  for(let i=0;i<=seg;i++){const t=i/seg;ctx.lineTo(getTX(t),gA(t)-whiteHalf);}
  for(let i=seg;i>=0;i--){const t=i/seg;ctx.lineTo(getTX(t),gA(t)+whiteHalf*Math.min(1,(1-t)/0.12));}
  ctx.closePath(); ctx.fillStyle='#e9eef7'; ctx.fill();
  ctx.beginPath();
  for(let i=0;i<=seg;i++){const t=i/seg;ctx.lineTo(getTX(t),gA(t)-whiteHalf);}
  for(let i=seg;i>=0;i--){const t=i/seg;ctx.lineTo(getTX(t),gA(t)+whiteHalf*0.15);}
  ctx.closePath(); ctx.fillStyle='#13171e'; ctx.fill(); ctx.restore();
}
const cards=[...document.querySelectorAll('.card')].map(el=>{
  const cv=el.querySelector('canvas');

  el.appendChild(note);
  el.addEventListener('click',()=>{

    el.classList.add('sel');

  });

});
function frame(){
  for(const c of cards){
    const ctx=c.ctx, W=c.cv.width, H=c.cv.height;
    ctx.clearRect(0,0,W,H);
    ctx.save();
    ctx.translate(W*0.40, H*0.85);

    ctx.scale(W/720*2.05, W/720*2.05);
    const bladeStart=0, bl=130, bladeEnd=130;
    const getTX=(t)=>bladeStart+(bladeEnd-bladeStart)*t;
    const gA=(t)=>getArcY(t,bl);
    try{ ctx.save(); FNS[c.i](ctx,bladeStart,bladeEnd,bl,2.2,gA,getTX); ctx.restore(); }
    catch(e){ try{ctx.restore();}catch(_){}
      if(!c.errShown){c.errShown=true; ctx.restore(); ctx.fillStyle='#ff8a8a'; ctx.font='20px sans-serif'; ctx.fillText('err: '+e.message, 20, 40); ctx.save();}
    }
    drawDarkKatana(ctx,bladeStart,bladeEnd,bl,2.2,gA,getTX);
    ctx.restore();
  }
  requestAnimationFrame(frame);
}
